<!-- NEWSLETTER SUBSCRIPTION WIDGET - CertificadoYa -->
<div class="newsletter-widget" id="newsletter-widget">
  <div class="newsletter-container">
    <div class="newsletter-header">
      <h3>Mantente informado</h3>
      <p>Recibe noticias y consejos directamente en tu email</p>
    </div>
    
    <form id="newsletter-form" class="newsletter-form">
      <!-- Email input -->
      <div class="form-group">
        <input 
          type="email" 
          id="newsletter-email" 
          placeholder="Tu email" 
          required
          aria-label="Correo electrónico"
        >
      </div>
      
      <!-- User type selector -->
      <div class="form-group user-type-group">
        <label class="radio-option">
          <input 
            type="radio" 
            name="userType" 
            value="technician" 
            required
            aria-label="Soy técnico certificado"
          >
          <span class="radio-label">
            <strong>📋 Soy técnico</strong>
            <small>Noticias técnicas y encargos</small>
          </span>
        </label>
        
        <label class="radio-option">
          <input 
            type="radio" 
            name="userType" 
            value="owner" 
            aria-label="Soy propietario o cliente"
          >
          <span class="radio-label">
            <strong>🏠 Soy propietario</strong>
            <small>Consejos para vender o alquilar</small>
          </span>
        </label>
      </div>
      
      <!-- Privacy checkbox -->
      <div class="form-group privacy-check">
        <label class="checkbox-option">
          <input 
            type="checkbox" 
            id="privacy-consent" 
            required
            aria-label="Acepto recibir comunicaciones"
          >
          <span>
            Acepto recibir comunicaciones de CertificadoYa y tengo más de 18 años
          </span>
        </label>
      </div>
      
      <!-- Submit button -->
      <button type="submit" class="btn-newsletter">
        <span>Suscribirse gratis</span>
        <span class="btn-arrow">→</span>
      </button>
      
      <!-- Success/Error message (hidden by default) -->
      <div class="newsletter-message" id="newsletter-message" style="display: none;"></div>
    </form>
  </div>
</div>

<style>
/* NEWSLETTER WIDGET STYLES */
.newsletter-widget {
  background: linear-gradient(135deg, #f3f9eb 0%, #ffffff 100%);
  border: 1px solid #d4e8a8;
  border-radius: 12px;
  padding: 2rem;
  margin: 2rem 0;
  box-shadow: 0 2px 12px rgba(84, 124, 36, 0.06);
}

.newsletter-container {
  max-width: 500px;
  margin: 0 auto;
}

.newsletter-header {
  text-align: center;
  margin-bottom: 1.8rem;
}

.newsletter-header h3 {
  font-size: 1.5rem;
  font-weight: 600;
  color: #20201f;
  margin: 0 0 0.5rem;
}

.newsletter-header p {
  font-size: 0.95rem;
  color: #6b7762;
  margin: 0;
}

.newsletter-form {
  display: flex;
  flex-direction: column;
  gap: 1.2rem;
}

.form-group {
  display: flex;
  flex-direction: column;
}

/* Email input */
#newsletter-email {
  padding: 0.75rem 1rem;
  border: 1px solid #d4e8a8;
  border-radius: 8px;
  font-size: 1rem;
  font-family: var(--font, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif);
  background: white;
  transition: all 0.2s;
  color: #20201f;
}

#newsletter-email:focus {
  outline: none;
  border-color: #547c24;
  box-shadow: 0 0 0 3px rgba(84, 124, 36, 0.08);
}

}

/* Radio buttons (User type) */
.user-type-group {
  gap: 0.8rem;
}

.radio-option {
  display: flex;
  align-items: flex-start;
  gap: 0.8rem;
  cursor: pointer;
  padding: 0.8rem;
  border: 1px solid transparent;
  border-radius: 8px;
  transition: all 0.2s;
}

.radio-option:hover {
  background: rgba(84, 124, 36, 0.04);
  border-color: #d4e8a8;
}

  width: 20px;
  height: 20px;
  min-width: 20px;

}

  display: flex;

  gap: 0.2rem;

.privacy-check {

.checkbox-option {
  display: flex;
  align-items: flex-start;
  gap: 0.6rem;

<script>
// NEWSLETTER WIDGET FUNCTIONALITY
document.addEventListener('DOMContentLoaded', function() {
  const form = document.getElementById('newsletter-form');
  const messageDiv = document.getElementById('newsletter-message');

  form.addEventListener('submit', async function(e) {
    e.preventDefault();

    const email = document.getElementById('newsletter-email').value;
    const userType = document.querySelector('input[name="userType"]:checked')?.value;
    const privacyConsent = document.getElementById('privacy-consent').checked;

    // Validation
    if (!email || !userType || !privacyConsent) {
      showMessage('Por favor, completa todos los campos', 'error');
      return;
    }

    // Prepare data
    const data = {
      email: email,
      userType: userType,
      timestamp: new Date().toISOString(),
      source: 'website'
    };

    try {
      // Option 1: Send to Supabase Edge Function (recommended)
      // Replace with your actual Supabase endpoint
      const response = await fetch('https://wypgqpgjlookbhuaiyxa.supabase.co/functions/v1/newsletter-subscribe', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' // Add your anon key here if needed
        },
        body: JSON.stringify(data)
      });

      if (response.ok) {
        showMessage('✓ ¡Gracias! Revisa tu email para confirmar', 'success');
        form.reset();
      } else {
        showMessage('Error al suscribirse. Intenta más tarde.', 'error');
      }
    } catch (error) {
      console.error('Newsletter subscription error:', error);
      // Fallback: Try Google Forms (alternative method)
      fallbackSubmit(email, userType);
    }
  });

  function showMessage(text, type) {
    messageDiv.textContent = text;
    messageDiv.className = `newsletter-message ${type}`;
    messageDiv.style.display = 'block';

    if (type === 'success') {
      setTimeout(() => {
        messageDiv.style.display = 'none';
      }, 5000);
    }
  }

  function fallbackSubmit(email, userType) {
    // Fallback: Email submission via hidden iframe
    const form = document.createElement('form');
    form.action = 'https://docs.google.com/forms/d/e/YOUR_GOOGLE_FORM_ID/formResponse';
    form.method = 'POST';
    form.target = 'hidden_iframe';
    form.style.display = 'none';

    const emailField = document.createElement('input');
    emailField.name = 'entry.YOUR_EMAIL_FIELD_ID';
    emailField.value = email;

    const typeField = document.createElement('input');
    typeField.name = 'entry.YOUR_TYPE_FIELD_ID';
    typeField.value = userType === 'technician' ? 'Técnico' : 'Propietario';

    form.appendChild(emailField);
    form.appendChild(typeField);
    document.body.appendChild(form);
    form.submit();
    document.body.removeChild(form);

    showMessage('✓ ¡Gracias por tu interés! Te enviaremos un email pronto.', 'success');
    document.getElementById('newsletter-form').reset();
  }
});
</script>
