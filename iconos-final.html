<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iconos CertificadoYa - Estilo Certicalia</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',sans-serif; background:#f8f7f4; padding:2rem; text-align:center; }
    h1 { color:#1a1a1a; margin-bottom:1.5rem; font-size:1.25rem; font-weight:600; }
    .grid { display:flex; gap:1.2rem; justify-content:center; flex-wrap:wrap; max-width:700px; margin:0 auto; }
    .item { background:white; border-radius:16px; padding:1.5rem; width:130px; text-align:center;
            box-shadow:0 2px 8px rgba(0,0,0,.03); border:1px solid #eee; }
    .item img { width:80px; height:80px; display:block; margin:0 auto .5rem; }
    .item span { display:block; font-size:.73rem; color:#555; font-weight:500; line-height:1.3; }
    .note { color:#aaa; font-size:.72rem; margin-top:2rem; font-style:italic; }
  </style>
</head>
<body>
  <h1><img src="/img/ico-confianza.svg" alt="Confirmado" width="18" height="18" style="vertical-align:middle"> 8 iconos nuevos — estilo Certicalia</h1>
  <div class="grid">
    <div class="item"><img src="/img/ico-certificado.svg" alt=""><span>Certificado</span></div>
    <div class="item"><img src="/img/ico-presupuesto.svg" alt=""><span>Presupuesto</span></div>
    <div class="item"><img src="/img/ico-rapido.svg" alt=""><span>Rápido</span></div>
    <div class="item"><img src="/img/ico-tecnicos.svg" alt=""><span>Técnicos</span></div>
    <div class="item"><img src="/img/ico-visita.svg" alt=""><span>Visita</span></div>
    <div class="item"><img src="/img/ico-ahorro.svg" alt=""><span>Ahorro</span></div>
    <div class="item"><img src="/img/ico-confianza.svg" alt=""><span>Confianza</span></div>
    <div class="item"><img src="/img/ico-legal.svg" alt=""><span>Legal</span></div>
  </div>
  <p class="note">Estilo inspirado en Certicalia · rellenos en verde · trazo #547c24 · fondos blancos</p>
</body>
</html>
