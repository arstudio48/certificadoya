<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pago confirmado | CertificadoYa</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#f5f7f5;color:#1a2e1e;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:2.5rem;max-width:480px;width:100%;text-align:center;box-shadow:0 4px 16px rgba(0,0,0,.04)}
.icon{font-size:3.5rem;margin-bottom:1rem}
h1{font-size:1.4rem;font-weight:700;color:#16a34a;margin-bottom:.75rem}
p{font-size:.88rem;color:#6b7b5e;line-height:1.6;margin-bottom:1.5rem}
.btn{display:inline-block;background:#16a34a;color:#fff;font-weight:600;padding:.6rem 1.5rem;border-radius:8px;font-size:.85rem;text-decoration:none}
.btn:hover{background:#15803d}
.loading{font-size:.85rem;color:#8a9a8a;margin:1rem 0}
.spinner{width:20px;height:20px;border:2px solid #dce8d0;border-top-color:#16a34a;border-radius:50%;animation:spin .6s linear infinite;margin:1rem auto}
@keyframes spin{to{transform:rotate(360deg)}}
.card small{display:block;margin-top:1rem;font-size:.72rem;color:#b0c0a8}
</style>
<link rel="icon" type="image/png" sizes="32x32" href="/img/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/img/favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/img/apple-touch-icon-180.png">
</head>
<body>
<div class="card" id="card">
  <div class="loading" id="loading-state">
    <div class="spinner"></div>
    <p>Verificando tu pago...</p>
  </div>
  <div id="success-content" style="display:none">
    <div class="icon">✅</div>
    <h1>¡Pago confirmado!</h1>
    <p>Tu reserva está en proceso. En las próximas 24h un técnico certificador aceptará tu encargo.<br><br>Te enviaremos un email con los siguientes pasos.</p>
    <a href="/" class="btn">Volver al inicio</a>
    <small>Si tienes cualquier duda, responde al email de confirmación que has recibido.</small>
  </div>
</div>
<script>
(function(){
  var params = new URLSearchParams(window.location.search);
  var sessionId = params.get('session_id');
  var loadingEl = document.getElementById('loading-state');
  var successEl = document.getElementById('success-content');

  if (!sessionId) {
    loadingEl.style.display = 'none';
    successEl.style.display = 'block';
    return;
  }

  async function verificarPago(intentos) {
    for (var i = 1; i <= intentos; i++) {
      try {
        var res = await fetch('https://wypgqpgjlookbhuaiyxa.supabase.co/functions/v1/stripe-checkout?action=confirm', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ session_id: sessionId })
        });
        var data = await res.json();
        if (data.success) {
          loadingEl.style.display = 'none';
          successEl.style.display = 'block';
          return;
        }
      } catch(e) {}
      if (i < intentos) await new Promise(function(r){setTimeout(r, i * 2000)});
    }
    loadingEl.style.display = 'none';
    successEl.style.display = 'block';
  }
  verificarPago(5);
})();
</script>
</body>
</html>
