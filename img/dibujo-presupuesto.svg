<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Calculator body -->
  <rect x="30" y="22" width="60" height="76" rx="6" stroke="#1a1a1a" stroke-width="2.5" fill="none"/>
  <!-- Screen -->
  <rect x="38" y="32" width="44" height="20" rx="3" stroke="#1a1a1a" stroke-width="2" fill="none"/>
  <text x="72" y="46" text-anchor="end" fill="#1a1a1a" font-size="10" font-weight="700" font-family="Montserrat,sans-serif">45€</text>
  <!-- Buttons row 1 -->
  <rect x="38" y="58" width="12" height="10" rx="2" stroke="#1a1a1a" stroke-width="2" fill="none"/>
  <rect x="54" y="58" width="12" height="10" rx="2" stroke="#1a1a1a" stroke-width="2" fill="none"/>
  <rect x="70" y="58" width="12" height="10" rx="2" stroke="#1a1a1a" stroke-width="2" fill="none"/>
  <!-- Buttons row 2 -->
  <rect x="38" y="72" width="12" height="10" rx="2" stroke="#1a1a1a" stroke-width="2" fill="none"/>
  <rect x="54" y="72" width="12" height="10" rx="2" stroke="#1a1a1a" stroke-width="2" fill="none"/>
  <rect x="70" y="72" width="12" height="10" rx="2" stroke="#1a1a1a" stroke-width="2" fill="none"/>
  <!-- Plus button -->
  <rect x="54" y="86" width="12" height="10" rx="2" stroke="#1a1a1a" stroke-width="2" fill="none"/>
  <line x1="60" y1="88" x2="60" y2="94" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
  <line x1="57" y1="91" x2="63" y2="91" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
  <!-- Hand pressing -->
  <path d="M90 60 Q100 58 104 50 Q106 46 104 42" stroke="#1a1a1a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="103" cy="40" r="4" stroke="#1a1a1a" stroke-width="2" fill="none"/>
  <!-- Euro coins falling -->
  <circle cx="20" cy="45" r="5" stroke="#1a1a1a" stroke-width="2" fill="none"/>
  <circle cx="24" cy="60" r="5" stroke="#1a1a1a" stroke-width="2" fill="none"/>
  <text x="22" y="62" text-anchor="middle" fill="#1a1a1a" font-size="6" font-weight="700">€</text>
  <text x="18" y="47" text-anchor="middle" fill="#1a1a1a" font-size="6" font-weight="700">€</text>
</svg>
