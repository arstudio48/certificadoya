<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- House -->
  <path d="M30 70 L60 38 L90 70" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <rect x="40" y="65" width="40" height="38" rx="3" stroke="#1a1a1a" stroke-width="2.5" fill="none"/>
  <rect x="48" y="76" width="24" height="27" rx="2" stroke="#1a1a1a" stroke-width="2" fill="none"/>
  <!-- Window -->
  <rect x="54" y="54" width="12" height="12" rx="2" stroke="#1a1a1a" stroke-width="2" fill="none"/>
  <!-- Magnifying glass -->
  <circle cx="86" cy="84" r="14" stroke="#1a1a1a" stroke-width="2.5" fill="none"/>
  <line x1="96" y1="94" x2="104" y2="102" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Steps/path to house -->
  <line x1="48" y1="103" x2="40" y2="103" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="48" y1="100" x2="36" y2="100" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Smoke from chimney -->
  <path d="M70 42 Q75 36 72 30 Q78 24 74 18" stroke="#1a1a1a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Ruler symbol -->
  <line x1="16" y1="30" x2="16" y2="50" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="35" x2="22" y2="35" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="16" y1="40" x2="20" y2="40" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="16" y1="45" x2="22" y2="45" stroke="#1a1a1a" stroke-width="1.5"/>
</svg>
