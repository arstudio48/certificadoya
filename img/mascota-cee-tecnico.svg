<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 450" fill="none">
  <!-- Shadow -->
  <ellipse cx="200" cy="430" rx="100" ry="12" fill="#e8ece6"/>

  <!-- Body -->
  <rect x="140" y="195" width="120" height="145" rx="18" fill="white" stroke="#d4d9d0" stroke-width="2"/>
  
  <!-- Polo shirt -->
  <path d="M140 215 L160 195 L200 205 L240 195 L260 215" fill="#547c24"/>
  <path d="M180 195 L200 205 L220 195 Z" fill="#3d5e1a"/>

  <!-- Collar -->
  <path d="M185 198 L200 215 L215 198" fill="white" stroke="#3d5e1a" stroke-width="1.5"/>

  <!-- Arms -->
  <rect x="100" y="210" width="45" height="18" rx="9" fill="#f5d7b5"/>
  <rect x="255" y="210" width="45" height="18" rx="9" fill="#f5d7b5"/>

  <!-- Left hand holding tablet -->
  <rect x="88" y="230" width="50" height="70" rx="6" fill="#e8ece6" stroke="#547c24" stroke-width="2"/>
  <rect x="93" y="238" width="40" height="48" rx="3" fill="#1a1a2e"/>
  <!-- Tablet content -->
  <rect x="97" y="242" width="32" height="3" rx="1" fill="#547c24" opacity="0.6"/>
  <rect x="97" y="249" width="32" height="2" rx="1" fill="#22c55e" opacity="0.5"/>
  <rect x="97" y="255" width="28" height="2" rx="1" fill="#d4d9d0"/>
  <rect x="97" y="261" width="24" height="2" rx="1" fill="#d4d9d0"/>
  <!-- Tablet home button -->
  <circle cx="113" cy="270" r="4" fill="none" stroke="#d4d9d0" stroke-width="1"/>

  <!-- Right hand giving thumbs up -->
  <path d="M300 210 Q315 200 320 185" stroke="#f5d7b5" stroke-width="14" fill="none" stroke-linecap="round"/>
  <!-- Thumb -->
  <rect x="316" y="172" width="10" height="16" rx="5" fill="#f5d7b5"/>
  
  <!-- Head -->
  <circle cx="200" cy="150" r="55" fill="#f5d7b5"/>
  
  <!-- Hard hat -->
  <path d="M135 140 Q135 85 200 80 Q265 85 265 140" fill="#f0b429"/>
  <rect x="130" y="136" width="140" height="12" rx="5" fill="#e09e1a"/>
  <!-- Hard hat shine -->
  <path d="M175 88 Q185 84 200 83" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.4"/>

  <!-- Eyes -->
  <ellipse cx="180" cy="145" rx="9" ry="10" fill="white"/>
  <ellipse cx="220" cy="145" rx="9" ry="10" fill="white"/>
  <circle cx="183" cy="145" r="5.5" fill="#2d3a1f"/>
  <circle cx="223" cy="145" r="5.5" fill="#2d3a1f"/>
  <circle cx="185" cy="142" r="2" fill="white"/>
  <circle cx="225" cy="142" r="2" fill="white"/>

  <!-- Big smile -->
  <path d="M178 168 Q200 190 222 168" stroke="#2d3a1f" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  
  <!-- Rosy cheeks -->
  <ellipse cx="163" cy="165" rx="10" ry="6" fill="#f0b429" opacity="0.2"/>
  <ellipse cx="237" cy="165" rx="10" ry="6" fill="#f0b429" opacity="0.2"/>

  <!-- Tool belt -->
  <rect x="140" y="320" width="120" height="12" rx="2" fill="#4a3728"/>
  <rect x="175" y="330" width="18" height="20" rx="3" fill="#e09e1a"/>
  <rect x="215" y="330" width="10" height="20" rx="2" fill="#d4d9d0"/>

  <!-- Legs -->
  <rect x="150" y="335" width="45" height="70" rx="8" fill="#4a3728"/>
  <rect x="205" y="335" width="45" height="70" rx="8" fill="#4a3728"/>

  <!-- Boots -->
  <rect x="145" y="398" width="55" height="25" rx="8" fill="#3d5e1a"/>
  <rect x="200" y="398" width="55" height="25" rx="8" fill="#3d5e1a"/>

  <!-- Name badge -->
  <rect x="195" y="205" width="55" height="22" rx="4" fill="#22c55e"/>
  <text x="222" y="218" text-anchor="middle" fill="white" font-size="7" font-weight="700" font-family="Montserrat,sans-serif">CERTIFICADOYA</text>

  <!-- Speech bubble -->
  <path d="M240 90 Q290 80 300 110 Q310 140 280 148 L268 168 L262 150 Q240 155 235 140 Q230 125 240 90Z" fill="white" stroke="#d4d9d0" stroke-width="1.5"/>
  <text x="268" y="125" text-anchor="middle" fill="#547c24" font-size="11" font-weight="700" font-family="Montserrat,sans-serif">¡Yo te</text>
  <text x="268" y="140" text-anchor="middle" fill="#547c24" font-size="11" font-weight="700" font-family="Montserrat,sans-serif">ayudo!</text>

  <!-- Background sparkles -->
  <circle cx="70" cy="130" r="4" fill="#f0b429" opacity="0.5"/>
  <circle cx="330" cy="100" r="3" fill="#f0b429" opacity="0.4"/>
  <circle cx="85" cy="300" r="3" fill="#22c55e" opacity="0.3"/>
  <circle cx="315" cy="280" r="4" fill="#22c55e" opacity="0.3"/>

</svg>
