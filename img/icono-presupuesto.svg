<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" rx="14" fill="#edf4e5"/>
  <!-- Calculator body -->
  <rect x="16" y="12" width="32" height="40" rx="4" fill="white" stroke="#547c24" stroke-width="2"/>
  <!-- Screen -->
  <rect x="20" y="16" width="24" height="10" rx="2" fill="#edf4e5" stroke="#547c24" stroke-width="1.5"/>
  <text x="40" y="24" text-anchor="end" fill="#547c24" font-size="7" font-weight="700" font-family="Montserrat,sans-serif">45€</text>
  <!-- Buttons -->
  <rect x="20" y="30" width="7" height="7" rx="1.5" fill="#547c24"/>
  <rect x="30" y="30" width="7" height="7" rx="1.5" fill="#547c24"/>
  <rect x="40" y="30" width="7" height="7" rx="1.5" fill="#547c24"/>
  <rect x="20" y="40" width="7" height="7" rx="1.5" fill="#547c24"/>
  <rect x="30" y="40" width="7" height="7" rx="1.5" fill="#547c24"/>
  <!-- Plus button -->
  <rect x="40" y="40" width="7" height="7" rx="1.5" fill="#f0b429"/>
  <text x="43" y="45" text-anchor="middle" fill="white" font-size="6" font-weight="700">+</text>
</svg>
