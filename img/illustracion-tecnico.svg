<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="#edf4e5"/>
  
  <!-- Body -->
  <rect x="70" y="105" width="60" height="55" rx="8" fill="#e8ece6"/>
  <rect x="74" y="110" width="20" height="18" rx="4" fill="#547c24" opacity="0.3"/>
  <rect x="106" y="110" width="20" height="18" rx="4" fill="#547c24" opacity="0.3"/>
  
  <!-- Arms -->
  <rect x="48" y="108" width="22" height="10" rx="5" fill="#d4d9d0"/>
  <rect x="130" y="108" width="22" height="10" rx="5" fill="#d4d9d0"/>
  
  <!-- Left hand holding plans -->
  <rect x="38" y="95" width="28" height="22" rx="3" fill="white" stroke="#547c24" stroke-width="1.5"/>
  <line x1="42" y1="100" x2="62" y2="100" stroke="#547c24" stroke-width="1.2"/>
  <line x1="42" y1="105" x2="62" y2="105" stroke="#547c24" stroke-width="1.2"/>
  <line x1="42" y1="110" x2="55" y2="110" stroke="#547c24" stroke-width="1.2"/>
  
  <!-- Head -->
  <circle cx="100" cy="82" r="22" fill="#f5d7b5"/>
  
  <!-- Hard hat -->
  <path d="M75 80 Q75 58 100 55 Q125 58 125 80" fill="#f0b429"/>
  <rect x="72" y="76" width="56" height="8" rx="4" fill="#e09e1a"/>
  
  <!-- Eyes -->
  <circle cx="93" cy="80" r="2.5" fill="#2d3a1f"/>
  <circle cx="107" cy="80" r="2.5" fill="#2d3a1f"/>
  
  <!-- Smile -->
  <path d="M92 90 Q100 96 108 90" stroke="#2d3a1f" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  
  <!-- Clipboard in right hand -->
  <rect x="140" y="92" width="18" height="24" rx="3" fill="#547c24"/>
  <rect x="143" y="95" width="12" height="2" rx="1" fill="white" opacity="0.6"/>
  <rect x="143" y="100" width="12" height="2" rx="1" fill="white" opacity="0.6"/>
  <rect x="143" y="105" width="8" height="2" rx="1" fill="white" opacity="0.6"/>
  
  <!-- Label "CEE" on clipboard -->
  <text x="149" y="118" text-anchor="middle" fill="white" font-size="7" font-weight="700" font-family="Montserrat,sans-serif">CEE</text>
</svg>
