<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 360" fill="none">
  <!-- Background -->
  <rect width="400" height="360" rx="16" fill="#f7f9f6"/>
  <circle cx="350" cy="40" r="100" fill="#edf4e5" opacity="0.5"/>
  <circle cx="50" cy="320" r="70" fill="#edf4e5" opacity="0.3"/>

  <!-- Silhouette profile - professional figure -->
  <g transform="translate(80, 30)">
    <!-- Head silhouette -->
    <ellipse cx="120" cy="55" rx="30" ry="35" fill="#d4d9d0"/>
    <!-- Body silhouette -->
    <path d="M90 90 Q95 135 85 180 L155 180 Q145 135 150 90Z" fill="#d4d9d0"/>
    <!-- Briefcase -->
    <rect x="82" y="160" width="76" height="40" rx="6" fill="#9aab8a"/>
    <rect x="105" y="155" width="30" height="10" rx="3" fill="#9aab8a"/>
    <rect x="105" y="155" width="30" height="3" rx="1" fill="#7a8b6e"/>
  </g>

  <!-- Blueprint/plans on the side -->
  <g transform="translate(230, 55)">
    <rect x="0" y="0" width="100" height="130" rx="4" fill="#e8f4ff" stroke="#93c5fd" stroke-width="1.5" transform="rotate(-3)"/>
    <!-- Building plan lines -->
    <rect x="15" y="20" width="70" height="55" rx="2" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.6"/>
    <line x1="15" y1="48" x2="85" y2="48" stroke="#3b82f6" stroke-width="0.5" opacity="0.4"/>
    <line x1="50" y1="20" x2="50" y2="75" stroke="#3b82f6" stroke-width="0.5" opacity="0.4"/>
    <rect x="35" y="38" width="20" height="25" rx="1" fill="none" stroke="#3b82f6" stroke-width="0.8"/>
    <!-- Measurements -->
    <line x1="5" y1="18" x2="5" y2="78" stroke="#ef4444" stroke-width="0.8"/>
    <line x1="3" y1="18" x2="7" y2="18" stroke="#ef4444" stroke-width="0.8"/>
    <line x1="3" y1="78" x2="7" y2="78" stroke="#ef4444" stroke-width="0.8"/>
    
    <!-- Floor plan label -->
    <rect x="5" y="95" width="90" height="25" rx="4" fill="#547c24"/>
    <text x="50" y="112" text-anchor="middle" fill="white" font-size="10" font-weight="600" font-family="Montserrat,sans-serif">VIVIENDA UNIFAMILIAR</text>
    
    <!-- Area text -->
    <text x="50" y="85" text-anchor="middle" fill="#6b7b5e" font-size="8" font-weight="500" font-family="Montserrat,sans-serif">120 m² · 3 dorm · 2 baños</text>
  </g>

  <!-- Data cards -->
  <g transform="translate(35, 260)">
    <!-- Card 1 -->
    <rect x="0" y="0" width="105" height="50" rx="8" fill="white" stroke="#e8ece6" stroke-width="1.5"/>
    <text x="15" y="22" fill="#6b7b5e" font-size="7" font-weight="500" font-family="Montserrat,sans-serif">CLASIFICACIÓN</text>
    <rect x="12" y="28" width="30" height="16" rx="4" fill="#22c55e"/>
    <text x="27" y="40" text-anchor="middle" fill="white" font-size="9" font-weight="700" font-family="Montserrat,sans-serif">A</text>
    <text x="55" y="40" fill="#2d3a1f" font-size="10" font-weight="600" font-family="Montserrat,sans-serif">22,4 kWh/m²</text>
    
    <!-- Card 2 -->
    <rect x="120" y="0" width="105" height="50" rx="8" fill="white" stroke="#e8ece6" stroke-width="1.5"/>
    <text x="135" y="22" fill="#6b7b5e" font-size="7" font-weight="500" font-family="Montserrat,sans-serif">AHORRO ANUAL</text>
    <text x="135" y="40" fill="#547c24" font-size="12" font-weight="700" font-family="Montserrat,sans-serif">680 €</text>
    <text x="175" y="40" fill="#6b7b5e" font-size="8" font-weight="400" font-family="Montserrat,sans-serif">/ año</text>
    
    <!-- Card 3 -->
    <rect x="240" y="0" width="105" height="50" rx="8" fill="white" stroke="#e8ece6" stroke-width="1.5"/>
    <text x="255" y="22" fill="#6b7b5e" font-size="7" font-weight="500" font-family="Montserrat,sans-serif">EMISIONES</text>
    <text x="255" y="40" fill="#16a34a" font-size="12" font-weight="700" font-family="Montserrat,sans-serif">4,2 t</text>
    <text x="295" y="40" fill="#6b7b5e" font-size="8" font-weight="400" font-family="Montserrat,sans-serif">CO₂</text>
  </g>

  <!-- Connection lines -->
  <line x1="200" y1="200" x2="155" y2="255" stroke="#d4d9d0" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="200" y1="200" x2="260" y2="255" stroke="#d4d9d0" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Badge -->
  <g transform="translate(125, 235)">
    <rect x="0" y="0" width="95" height="20" rx="10" fill="#edf4e5"/>
    <text x="47" y="14" text-anchor="middle" fill="#547c24" font-size="8" font-weight="600" font-family="Montserrat,sans-serif">TÉCNICO COLEGIADO</text>
  </g>

</svg>
