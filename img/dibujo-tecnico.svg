<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Technician body -->
  <ellipse cx="48" cy="58" rx="14" ry="20" stroke="#1a1a1a" stroke-width="2.5" fill="none"/>
  <!-- Head -->
  <circle cx="48" cy="32" r="14" stroke="#1a1a1a" stroke-width="2.5" fill="none"/>
  <!-- Hard hat -->
  <path d="M32 30 Q32 18 48 16 Q64 18 64 30" stroke="#1a1a1a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <line x1="30" y1="30" x2="66" y2="30" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Arms -->
  <line x1="34" y1="54" x2="14" y2="44" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="62" y1="54" x2="82" y2="64" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Clipboard/tablet in left hand -->
  <rect x="4" y="36" width="18" height="26" rx="3" stroke="#1a1a1a" stroke-width="2" fill="none"/>
  <line x1="8" y1="42" x2="18" y2="42" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="8" y1="48" x2="18" y2="48" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="8" y1="54" x2="14" y2="54" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Right hand with checkmark -->
  <path d="M82 64 L86 66 L94 58" stroke="#1a1a1a" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Legs -->
  <line x1="38" y1="78" x2="34" y2="104" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="58" y1="78" x2="62" y2="104" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Boots -->
  <line x1="30" y1="104" x2="38" y2="104" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round"/>
  <line x1="58" y1="104" x2="66" y2="104" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round"/>
  <!-- Shield badge on chest -->
  <path d="M42 50 L48 46 L54 50 V56 Q48 60 42 56Z" stroke="#1a1a1a" stroke-width="1.5" fill="none"/>
  <text x="48" y="54" text-anchor="middle" fill="#1a1a1a" font-size="4">✓</text>
</svg>
