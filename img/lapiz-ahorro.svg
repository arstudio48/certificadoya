<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 140" fill="none">
  <defs>
    <filter id="lapiz" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="lapiz-suave" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.5" numOctaves="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <!-- Etiqueta de precio -->
  <rect x="36" y="18" width="68" height="36" rx="4" stroke="#2a2a2a" stroke-width="1.8" fill="none" filter="url(#lapiz)"/>
  <circle cx="70" cy="36" r="12" stroke="#2a2a2a" stroke-width="1.6" fill="none" filter="url(#lapiz)"/>
  <line x1="70" y1="28" x2="70" y2="44" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round" filter="url(#lapiz)"/>
  <line x1="62" y1="33" x2="78" y2="33" stroke="#2a2a2a" stroke-width="1.3" stroke-linecap="round" filter="url(#lapiz)"/>
  <line x1="62" y1="39" x2="78" y2="39" stroke="#2a2a2a" stroke-width="1.3" stroke-linecap="round" filter="url(#lapiz)"/>
  <!-- Flecha descendente -->
  <line x1="70" y1="60" x2="70" y2="104" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round" filter="url(#lapiz)"/>
  <path d="M58 92 L70 104 L82 92" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#lapiz)"/>
  <!-- Monedas -->
  <circle cx="40" cy="108" r="8" stroke="#2a2a2a" stroke-width="1.2" fill="none" opacity="0.25" filter="url(#lapiz-suave)"/>
  <circle cx="100" cy="104" r="8" stroke="#2a2a2a" stroke-width="1.2" fill="none" opacity="0.25" filter="url(#lapiz-suave)"/>
</svg>