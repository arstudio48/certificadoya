<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 140" fill="none">
  <defs>
    <filter id="lapiz" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="lapiz-suave" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.5" numOctaves="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <!-- Documento legal -->
  <rect x="34" y="14" width="72" height="106" rx="3" stroke="#2a2a2a" stroke-width="1.8" fill="none" filter="url(#lapiz)"/>
  <rect x="34" y="14" width="72" height="106" rx="3" stroke="#2a2a2a" stroke-width="0.7" fill="none" opacity="0.35" transform="translate(0.2,-0.2)"/>
  <!-- Esquina -->
  <path d="M88 14 V28 H102" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#lapiz)"/>
  <!-- Líneas de texto -->
  <line x1="46" y1="38" x2="94" y2="38" stroke="#2a2a2a" stroke-width="1.2" stroke-linecap="round" opacity="0.3" filter="url(#lapiz)"/>
  <line x1="46" y1="48" x2="82" y2="48" stroke="#2a2a2a" stroke-width="1.2" stroke-linecap="round" opacity="0.3" filter="url(#lapiz)"/>
  <line x1="46" y1="58" x2="88" y2="58" stroke="#2a2a2a" stroke-width="1.2" stroke-linecap="round" opacity="0.3" filter="url(#lapiz)"/>
  <!-- Sello notarial -->
  <circle cx="70" cy="88" r="22" stroke="#2a2a2a" stroke-width="1.6" fill="none" filter="url(#lapiz)"/>
  <circle cx="70" cy="88" r="16" stroke="#2a2a2a" stroke-width="0.8" fill="none" opacity="0.3" filter="url(#lapiz-suave)"/>
  <path d="M58 84 L68 96 L84 78" stroke="#2a2a2a" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#lapiz)"/>
  <!-- Pequeña estrella decorativa en sello -->
  <circle cx="70" cy="88" r="3" fill="none" stroke="#2a2a2a" stroke-width="0.6" opacity="0.2"/>
</svg>