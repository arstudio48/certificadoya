<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Shadow under house -->
  <ellipse cx="200" cy="370" rx="120" ry="15" fill="#e8ece6"/>

  <!-- House body -->
  <rect x="80" y="160" width="240" height="200" rx="12" fill="white" stroke="#547c24" stroke-width="3"/>
  
  <!-- Roof -->
  <path d="M60 165 L200 40 L340 165" fill="#547c24" stroke="#3d5e1a" stroke-width="3" stroke-linejoin="round"/>
  
  <!-- Chimney -->
  <rect x="255" y="55" width="30" height="55" rx="4" fill="#e8ece6" stroke="#3d5e1a" stroke-width="2"/>
  
  <!-- Smoke puffs -->
  <circle cx="270" cy="42" r="8" fill="#d4d9d0" opacity="0.6"/>
  <circle cx="282" cy="30" r="6" fill="#d4d9d0" opacity="0.4"/>
  <circle cx="275" cy="20" r="5" fill="#d4d9d0" opacity="0.3"/>

  <!-- Windows - eyes -->
  <!-- Left window/eye -->
  <rect x="105" y="185" width="65" height="55" rx="8" fill="#e0f0d0" stroke="#3d5e1a" stroke-width="2.5"/>
  <line x1="137" y1="185" x2="137" y2="240" stroke="#3d5e1a" stroke-width="2"/>
  <line x1="105" y1="212" x2="170" y2="212" stroke="#3d5e1a" stroke-width="2"/>
  
  <!-- Right window/eye -->
  <rect x="230" y="185" width="65" height="55" rx="8" fill="#e0f0d0" stroke="#3d5e1a" stroke-width="2.5"/>
  <line x1="262" y1="185" x2="262" y2="240" stroke="#3d5e1a" stroke-width="2"/>
  <line x1="230" y1="212" x2="295" y2="212" stroke="#3d5e1a" stroke-width="2"/>
  
  <!-- Windows glow/shine -->
  <rect x="108" y="188" width="15" height="15" rx="3" fill="white" opacity="0.4"/>
  <rect x="233" y="188" width="15" height="15" rx="3" fill="white" opacity="0.4"/>

  <!-- Door / Mouth (smile shape) -->
  <rect x="160" y="280" width="80" height="70" rx="8" fill="#3d5e1a"/>
  <rect x="165" y="285" width="70" height="60" rx="5" fill="#547c24"/>
  
  <!-- Door handle -->
  <circle cx="218" cy="320" r="5" fill="#f0b429"/>
  
  <!-- Door windows -->
  <rect x="172" y="292" width="25" height="25" rx="4" fill="#e0f0d0"/>
  <rect x="203" y="292" width="25" height="25" rx="4" fill="#e0f0d0"/>

  <!-- Energy Label on the house chest -->
  <rect x="156" y="240" width="88" height="38" rx="6" fill="#22c55e" stroke="#1a9a42" stroke-width="2"/>
  <text x="200" y="255" text-anchor="middle" fill="white" font-size="9" font-weight="600" font-family="Montserrat,sans-serif">ETIQUETA</text>
  <text x="200" y="273" text-anchor="middle" fill="white" font-size="22" font-weight="800" font-family="Montserrat,sans-serif">A+++</text>

  <!-- Energy rays around the label -->
  <line x1="140" y1="240" x2="128" y2="230" stroke="#f0b429" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="260" y1="240" x2="272" y2="230" stroke="#f0b429" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="140" y1="278" x2="128" y2="288" stroke="#f0b429" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="260" y1="278" x2="272" y2="288" stroke="#f0b429" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="138" y1="259" x2="124" y2="259" stroke="#f0b429" stroke-width="2" stroke-linecap="round"/>
  <line x1="262" y1="259" x2="276" y2="259" stroke="#f0b429" stroke-width="2" stroke-linecap="round"/>

  <!-- Small leaf/plant beside house -->
  <path d="M80 360 Q60 340 55 320" stroke="#547c24" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M55 320 Q45 310 40 315" stroke="#547c24" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M55 320 Q60 305 55 300" stroke="#547c24" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Ground -->
  <line x1="50" y1="360" x2="350" y2="360" stroke="#d4d9d0" stroke-width="2"/>
  
  <!-- Small ground details -->
  <ellipse cx="310" cy="365" rx="8" ry="3" fill="#d4d9d0" opacity="0.5"/>
  <ellipse cx="100" cy="368" rx="6" ry="2" fill="#d4d9d0" opacity="0.4"/>

</svg>
