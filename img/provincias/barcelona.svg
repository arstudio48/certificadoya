<svg xmlns="http://www.w3.org/2000/svg" width="400" height="220" viewBox="0 0 400 220">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a3a4a"/>
      <stop offset="100%" stop-color="#2d5a6e"/>
    </linearGradient>
  </defs>
  <rect width="400" height="220" fill="url(#bg)" rx="10"/>
  <!-- Modern building silhouettes -->
  <g fill="rgba(255,255,255,.12)">
    <rect x="80" y="90" width="30" height="100" rx="1"/>
    <rect x="120" y="70" width="35" height="120" rx="1"/>
    <rect x="165" y="50" width="70" height="140" rx="2"/>
    <rect x="245" y="80" width="40" height="110" rx="1"/>
    <rect x="295" y="100" width="50" height="90" rx="1"/>
  </g>
  <!-- Highlighted building (Torre Glòries style) -->
  <g fill="rgba(255,255,255,.22)">
    <polygon points="200,30 165,190 235,190"/>
  </g>
  <!-- Grid pattern for modern feel -->
  <g fill="rgba(255,255,255,.06)">
    <rect x="0" y="60" width="400" height="1"/>
    <rect x="0" y="120" width="400" height="1"/>
    <rect x="0" y="180" width="400" height="1"/>
  </g>
  <rect x="20" y="160" width="190" height="36" rx="18" fill="rgba(255,255,255,.15)"/>
  <text x="115" y="184" text-anchor="middle" fill="white" font-family="Montserrat,sans-serif" font-weight="700" font-size="18">Barcelona</text>
  <circle cx="350" cy="50" r="20" fill="rgba(255,255,255,.1)"/>
  <text x="350" y="57" text-anchor="middle" fill="rgba(255,255,255,.6)" font-size="20">✦</text>
</svg>
