<svg xmlns="http://www.w3.org/2000/svg" width="400" height="220" viewBox="0 0 400 220">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B4513"/>
      <stop offset="100%" stop-color="#D2691E"/>
    </linearGradient>
  </defs>
  <rect width="400" height="220" fill="url(#bg)" rx="10"/>
  <!-- Moorish arches -->
  <g fill="rgba(255,255,255,.1)">
    <path d="M100,190 Q100,120 150,120 Q200,120 200,190"/>
    <path d="M220,190 Q220,100 280,100 Q340,100 340,190"/>
  </g>
  <!-- Giralda silhouette -->
  <g fill="rgba(255,255,255,.2)">
    <rect x="185" y="30" width="30" height="160" rx="2"/>
    <rect x="175" y="40" width="50" height="8" rx="2"/>
    <rect x="175" y="60" width="50" height="8" rx="2"/>
    <rect x="175" y="80" width="50" height="8" rx="2"/>
    <rect x="185" y="95" width="30" height="20" rx="2"/>
    <rect x="180" y="120" width="40" height="8" rx="2"/>
    <rect x="180" y="140" width="40" height="8" rx="2"/>
    <!-- weather vane -->
    <rect x="197" y="20" width="6" height="15" rx="1"/>
  </g>
  <!-- Ornamental circles -->
  <circle cx="60" cy="60" r="30" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="2"/>
  <circle cx="340" cy="170" r="25" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="2"/>
  <rect x="20" y="160" width="160" height="36" rx="18" fill="rgba(255,255,255,.15)"/>
  <text x="100" y="184" text-anchor="middle" fill="white" font-family="Montserrat,sans-serif" font-weight="700" font-size="18">Sevilla</text>
  <circle cx="350" cy="50" r="20" fill="rgba(255,255,255,.1)"/>
  <text x="350" y="57" text-anchor="middle" fill="rgba(255,255,255,.6)" font-size="20">🌿</text>
</svg>
