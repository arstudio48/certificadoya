<svg xmlns="http://www.w3.org/2000/svg" width="400" height="220" viewBox="0 0 400 220">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2d5a3a"/>
      <stop offset="100%" stop-color="#4a7c5a"/>
    </linearGradient>
  </defs>
  <rect width="400" height="220" fill="url(#bg)" rx="10"/>
  <!-- Mountains / green hills -->
  <g fill="rgba(255,255,255,.08)">
    <polygon points="0,160 60,90 120,160"/>
    <polygon points="80,160 160,60 240,160"/>
    <polygon points="200,160 280,75 360,160"/>
    <polygon points="300,160 370,100 400,140 400,160"/>
  </g>
  <!-- Sea wave -->
  <g fill="rgba(255,255,255,.12)">
    <path d="M0,180 Q50,170 100,180 Q150,190 200,180 Q250,170 300,180 Q350,190 400,180 L400,220 L0,220Z"/>
  </g>
  <!-- Ship silhouette -->
  <g fill="rgba(255,255,255,.2)">
    <polygon points="120,170 140,155 170,155 190,170"/>
    <rect x="150" y="148" width="4" height="15" rx="1"/>
    <polygon points="154,150 154,164 180,158"/>
  </g>
  <rect x="20" y="160" width="190" height="36" rx="18" fill="rgba(255,255,255,.15)"/>
  <text x="115" y="184" text-anchor="middle" fill="white" font-family="Montserrat,sans-serif" font-weight="700" font-size="17">Gijón / Asturias</text>
  <circle cx="350" cy="50" r="20" fill="rgba(255,255,255,.1)"/>
  <text x="350" y="57" text-anchor="middle" fill="rgba(255,255,255,.6)" font-size="20">⚓</text>
</svg>
