<svg xmlns="http://www.w3.org/2000/svg" width="400" height="220" viewBox="0 0 400 220">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3d5a1e"/>
      <stop offset="100%" stop-color="#547c24"/>
    </linearGradient>
  </defs>
  <rect width="400" height="220" fill="url(#bg)" rx="10"/>
  <!-- Building silhouettes (Puerta de Alcalá + skyline) -->
  <g fill="rgba(255,255,255,.15)">
    <rect x="60" y="100" width="50" height="90" rx="2"/>
    <rect x="120" y="80" width="40" height="110" rx="2"/>
    <rect x="170" y="60" width="60" height="130" rx="2"/>
    <rect x="240" y="90" width="45" height="100" rx="2"/>
    <rect x="295" y="110" width="50" height="80" rx="2"/>
  </g>
  <!-- Main arch -->
  <g fill="rgba(255,255,255,.25)">
    <rect x="175" y="50" width="50" height="140" rx="2"/>
    <rect x="165" y="70" width="70" height="15" rx="3"/>
    <rect x="165" y="100" width="70" height="15" rx="3"/>
    <rect x="165" y="130" width="70" height="15" rx="3"/>
  </g>
  <!-- Label -->
  <rect x="20" y="160" width="160" height="36" rx="18" fill="rgba(255,255,255,.15)"/>
  <text x="100" y="184" text-anchor="middle" fill="white" font-family="Montserrat,sans-serif" font-weight="700" font-size="18">Madrid</text>
  <!-- Small icon: sun/star -->
  <circle cx="350" cy="50" r="20" fill="rgba(255,255,255,.1)"/>
  <text x="350" y="57" text-anchor="middle" fill="rgba(255,255,255,.6)" font-size="20">★</text>
</svg>
