<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 350" fill="none">
  <!-- Background subtle shape -->
  <circle cx="320" cy="60" r="120" fill="#edf4e5" opacity="0.5"/>
  <circle cx="80" cy="300" r="80" fill="#edf4e5" opacity="0.3"/>

  <!-- House - isometric style -->
  <g transform="translate(140, 100)">
    <!-- Front wall -->
    <rect x="0" y="40" width="120" height="100" rx="4" fill="white" stroke="#d4d9d0" stroke-width="2"/>
    <!-- Left wall (isometric) -->
    <path d="M-50 70 L0 40 L0 140 L-50 170Z" fill="#f7f9f6" stroke="#d4d9d0" stroke-width="2"/>
    <!-- Right wall -->
    <path d="M120 40 L170 70 L170 170 L120 140Z" fill="#edf4e5" stroke="#d4d9d0" stroke-width="2"/>
    
    <!-- Roof -->
    <path d="M-60 70 L10 0 L130 0 L180 70Z" fill="#547c24" stroke="#3d5e1a" stroke-width="2"/>
    <path d="M10 0 L130 0 L120 40 L0 40Z" fill="#3d5e1a" stroke="#3d5e1a" stroke-width="1.5"/>

    <!-- Windows -->
    <rect x="15" y="65" width="35" height="35" rx="3" fill="#e0f0d0" stroke="#3d5e1a" stroke-width="1.5"/>
    <rect x="70" y="65" width="35" height="35" rx="3" fill="#e0f0d0" stroke="#3d5e1a" stroke-width="1.5"/>
    
    <!-- Door -->
    <rect x="35" y="95" width="50" height="45" rx="4" fill="#3d5e1a"/>
    <rect x="40" y="100" width="40" height="35" rx="3" fill="#547c24"/>
    <circle cx="70" cy="120" r="3" fill="#f0b429"/>

    <!-- Energy label on roof -->
    <rect x="30" y="-15" width="60" height="22" rx="4" fill="#22c55e"/>
    <text x="60" y="-4" text-anchor="middle" fill="white" font-size="8" font-weight="700" font-family="Montserrat,sans-serif">A+++</text>
    <rect x="30" y="-15" width="60" height="22" rx="4" fill="none" stroke="#1a9a42" stroke-width="1"/>
  </g>

  <!-- Energy efficiency arrow -->
  <g transform="translate(40, 260)">
    <!-- Scale bar -->
    <rect x="0" y="0" width="320" height="8" rx="4" fill="#e8ece6"/>
    <!-- Colored segments -->
    <rect x="0" y="0" width="40" height="8" rx="4" fill="#dc2626"/>
    <rect x="40" y="0" width="40" height="8" fill="#ea580c"/>
    <rect x="80" y="0" width="40" height="8" fill="#f0b429"/>
    <rect x="120" y="0" width="40" height="8" fill="#84cc16"/>
    <rect x="160" y="0" width="40" height="8" fill="#22c55e"/>
    <rect x="200" y="0" width="40" height="8" rx="0" fill="#16a34a"/>
    <rect x="240" y="0" width="40" height="8" rx="0" fill="#15803d"/>
    <rect x="280" y="0" width="40" height="8" rx="4" fill="#166534"/>
    
    <!-- Labels -->
    <text x="15" y="-5" text-anchor="middle" fill="#9ca3af" font-size="7" font-weight="600" font-family="Montserrat,sans-serif">G</text>
    <text x="55" y="-5" text-anchor="middle" fill="#9ca3af" font-size="7" font-weight="600" font-family="Montserrat,sans-serif">F</text>
    <text x="95" y="-5" text-anchor="middle" fill="#9ca3af" font-size="7" font-weight="600" font-family="Montserrat,sans-serif">E</text>
    <text x="135" y="-5" text-anchor="middle" fill="#9ca3af" font-size="7" font-weight="600" font-family="Montserrat,sans-serif">D</text>
    <text x="175" y="-5" text-anchor="middle" fill="#9ca3af" font-size="7" font-weight="600" font-family="Montserrat,sans-serif">C</text>
    <text x="215" y="-5" text-anchor="middle" fill="#9ca3af" font-size="7" font-weight="600" font-family="Montserrat,sans-serif">B</text>
    <text x="255" y="-5" text-anchor="middle" fill="#9ca3af" font-size="7" font-weight="600" font-family="Montserrat,sans-serif">A</text>
    <text x="295" y="-5" text-anchor="middle" fill="#9ca3af" font-size="7" font-weight="600" font-family="Montserrat,sans-serif">A+</text>
    
    <!-- Cursor/indicator pointing to A -->
    <path d="M260 -12 L268 0 L252 0Z" fill="#547c24"/>
  </g>

  <!-- Data elements - floating -->
  <!-- Temperature icon -->
  <g transform="translate(280, 90)">
    <rect x="0" y="0" width="40" height="20" rx="6" fill="white" stroke="#d4d9d0" stroke-width="1.5"/>
    <line x1="8" y1="10" x2="32" y2="10" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
    <circle cx="16" cy="10" r="3" fill="#ef4444"/>
    <rect x="0" y="2" width="40" height="5" rx="3" fill="#ef4444" opacity="0.15"/>
  </g>

  <!-- CO2 icon -->
  <g transform="translate(50, 100)">
    <rect x="0" y="0" width="45" height="20" rx="6" fill="white" stroke="#d4d9d0" stroke-width="1.5"/>
    <text x="22" y="14" text-anchor="middle" fill="#6b7b5e" font-size="9" font-weight="600" font-family="Montserrat,sans-serif">CO₂</text>
  </g>

  <!-- Eco leaf -->
  <g transform="translate(60, 180)">
    <path d="M0 20 Q5 0 20 -5 Q15 5 15 20Z" fill="#22c55e"/>
    <path d="M15 20 Q20 0 35 -5 Q30 5 30 20Z" fill="#16a34a"/>
  </g>

  <!-- Lines connecting elements -->
  <line x1="200" y1="240" x2="250" y2="175" stroke="#d4d9d0" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="200" y1="240" x2="120" y2="175" stroke="#d4d9d0" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="200" y1="240" x2="60" y2="195" stroke="#d4d9d0" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Badge -->
  <g transform="translate(145, 280)">
    <rect x="0" y="0" width="110" height="24" rx="12" fill="#547c24"/>
    <text x="55" y="16" text-anchor="middle" fill="white" font-size="9" font-weight="600" font-family="Montserrat,sans-serif">EFICIENCIA ENERGÉTICA</text>
  </g>

</svg>
