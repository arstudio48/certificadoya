<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 420" fill="none">
  <!-- Shadow -->
  <ellipse cx="200" cy="405" rx="90" ry="12" fill="#e8ece6"/>

  <!-- Cape -->
  <path d="M120 180 Q80 280 60 390 Q130 360 200 380 Q270 360 340 390 Q320 280 280 180Z" fill="#547c24" opacity="0.3"/>
  
  <!-- Body -->
  <rect x="145" y="175" width="110" height="130" rx="20" fill="white" stroke="#3d5e1a" stroke-width="2.5"/>
  
  <!-- Suit detail - chest emblem area -->
  <circle cx="200" cy="220" r="35" fill="#edf4e5" stroke="#547c24" stroke-width="2"/>
  
  <!-- Emblem A+ -->
  <text x="200" y="228" text-anchor="middle" fill="#547c24" font-size="32" font-weight="800" font-family="Montserrat,sans-serif">A+</text>
  
  <!-- Belt -->
  <rect x="145" y="270" width="110" height="12" rx="4" fill="#3d5e1a"/>
  <rect x="195" y="268" width="10" height="16" rx="3" fill="#f0b429"/>

  <!-- Head -->
  <circle cx="200" cy="132" r="48" fill="#f5d7b5"/>
  
  <!-- Hair -->
  <path d="M152 120 Q160 80 200 72 Q240 80 248 120" fill="#4a3728"/>
  
  <!-- Eyes -->
  <ellipse cx="183" cy="128" rx="8" ry="9" fill="white"/>
  <ellipse cx="217" cy="128" rx="8" ry="9" fill="white"/>
  <circle cx="185" cy="128" r="5" fill="#2d3a1f"/>
  <circle cx="219" cy="128" r="5" fill="#2d3a1f"/>
  <!-- Eye shine -->
  <circle cx="187" cy="125" r="2" fill="white"/>
  <circle cx="221" cy="125" r="2" fill="white"/>

  <!-- Smile -->
  <path d="M182 148 Q200 162 218 148" stroke="#2d3a1f" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Eyebrows -->
  <path d="M172 116 Q182 110 192 114" stroke="#4a3728" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M208 114 Q218 110 228 116" stroke="#4a3728" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Mask -->
  <path d="M150 122 Q170 112 200 115 Q230 112 250 122" fill="none" stroke="#547c24" stroke-width="3"/>
  <path d="M155 122 Q175 140 200 138 Q225 140 245 122" fill="none" stroke="#547c24" stroke-width="3"/>

  <!-- Arms -->
  <!-- Left arm raised -->
  <path d="M145 195 Q110 170 95 140" stroke="#f5d7b5" stroke-width="18" fill="none" stroke-linecap="round"/>
  <!-- Right arm raised -->
  <path d="M255 195 Q290 170 305 140" stroke="#f5d7b5" stroke-width="18" fill="none" stroke-linecap="round"/>

  <!-- Gloves -->
  <circle cx="95" cy="138" r="11" fill="#547c24"/>
  <circle cx="305" cy="138" r="11" fill="#547c24"/>

  <!-- Fists -->
  <circle cx="95" cy="135" r="7" fill="#f5d7b5"/>
  <circle cx="305" cy="135" r="7" fill="#f5d7b5"/>

  <!-- Legs -->
  <rect x="150" y="295" width="40" height="75" rx="8" fill="white" stroke="#3d5e1a" stroke-width="2"/>
  <rect x="210" y="295" width="40" height="75" rx="8" fill="white" stroke="#3d5e1a" stroke-width="2"/>
  
  <!-- Boots -->
  <rect x="148" y="358" width="45" height="28" rx="8" fill="#3d5e1a"/>
  <rect x="207" y="358" width="45" height="28" rx="8" fill="#3d5e1a"/>

  <!-- Energy sparkle effects -->
  <path d="M70 120 L60 110 M65 130 L55 125 M85 105 L75 95" stroke="#f0b429" stroke-width="2" stroke-linecap="round"/>
  <path d="M330 120 L340 110 M335 130 L345 125 M315 105 L325 95" stroke="#f0b429" stroke-width="2" stroke-linecap="round"/>

  <!-- Floating sparkles -->
  <circle cx="75" cy="90" r="3" fill="#f0b429" opacity="0.7"/>
  <circle cx="325" cy="85" r="3" fill="#f0b429" opacity="0.7"/>
  <circle cx="200" cy="56" r="4" fill="#f0b429" opacity="0.6"/>

</svg>
