
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fef9c3"/>
      <stop offset="100%" stop-color="#fde047"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg2)"/>
  <!-- Coin stack -->
  <ellipse cx="400" cy="320" rx="80" ry="20" fill="#ca8a04" opacity="0.3"/>
  <ellipse cx="400" cy="290" rx="70" ry="18" fill="#eab308"/>
  <ellipse cx="400" cy="290" rx="70" ry="18" fill="none" stroke="#ca8a04" stroke-width="2"/>
  <ellipse cx="400" cy="270" rx="65" ry="16" fill="#eab308"/>
  <ellipse cx="400" cy="270" rx="65" ry="16" fill="none" stroke="#ca8a04" stroke-width="2"/>
  <ellipse cx="400" cy="250" rx="60" ry="15" fill="#eab308"/>
  <ellipse cx="400" cy="250" rx="60" ry="15" fill="none" stroke="#ca8a04" stroke-width="2"/>
  <ellipse cx="400" cy="230" rx="55" ry="14" fill="#eab308"/>
  <ellipse cx="400" cy="230" rx="55" ry="14" fill="none" stroke="#ca8a04" stroke-width="2"/>
  <text x="400" y="265" text-anchor="middle" fill="#854d0e" font-size="18" font-weight="bold">€</text>
  <!-- Upward arrow -->
  <path d="M400 220 L400 120" stroke="#16a34a" stroke-width="6" stroke-linecap="round"/>
  <polygon points="400,100 390,120 410,120" fill="#16a34a"/>
  <!-- Euro symbol rising -->
  <text x="430" y="130" fill="#16a34a" font-size="22" font-weight="bold">+60%</text>
  <!-- Decorative -->
  <circle cx="140" cy="100" r="25" fill="#eab308" opacity="0.08"/>
  <circle cx="660" cy="380" r="20" fill="#16a34a" opacity="0.08"/>
</svg>