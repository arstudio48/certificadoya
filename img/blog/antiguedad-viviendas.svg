<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="Outfit, sans-serif">
  <rect width="800" height="380" fill="#f7f9f6" rx="12"/>
  <text x="400" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#2d3a1f">Distribución del parque de viviendas por año de construcción</text>
  <text x="400" y="48" text-anchor="middle" font-size="11" fill="#9aab8a">Fuente: INE, Censo de Viviendas 2021</text>

  <!-- Antes 1940 -->
  <rect x="60" y="80" width="40" height="200" fill="#3a6b14" rx="4"/>
  <text x="80" y="72" text-anchor="middle" font-size="12" fill="#3a6b14" font-weight="700">6%</text>
  <text x="80" y="295" text-anchor="middle" font-size="10" fill="#555">Antes</text>
  <text x="80" y="308" text-anchor="middle" font-size="10" fill="#555">1940</text>

  <!-- 1940-1960 -->
  <rect x="120" y="120" width="50" height="160" fill="#4a7c1e" rx="4"/>
  <text x="145" y="112" text-anchor="middle" font-size="12" fill="#4a7c1e" font-weight="700">10%</text>
  <text x="145" y="295" text-anchor="middle" font-size="10" fill="#555">1940-</text>
  <text x="145" y="308" text-anchor="middle" font-size="10" fill="#555">1960</text>

  <!-- 1960-1980 ★ mayor -->
  <rect x="190" y="0" width="70" height="280" fill="#6ba32e" rx="4"/>
  <text x="225" y="292" text-anchor="middle" font-size="12" fill="#6ba32e" font-weight="700">42%</text>
  <text x="225" y="308" text-anchor="middle" font-size="11" fill="#2d3a1f" font-weight="600" fill="#3a6b14">1960-1980</text>
  <text x="225" y="16" text-anchor="middle" font-size="11" fill="#fff" font-weight="600">★ BURBUJA</text>

  <!-- 1980-2000 -->
  <rect x="280" y="100" width="65" height="180" fill="#8bc34a" rx="4"/>
  <text x="312" y="92" text-anchor="middle" font-size="12" fill="#8bc34a" font-weight="700">21%</text>
  <text x="312" y="295" text-anchor="middle" font-size="10" fill="#555">1980-</text>
  <text x="312" y="308" text-anchor="middle" font-size="10" fill="#555">2000</text>

  <!-- 2000-2007 -->
  <rect x="365" y="120" width="60" height="160" fill="#aed581" rx="4"/>
  <text x="395" y="112" text-anchor="middle" font-size="12" fill="#aed581" font-weight="700">13%</text>
  <text x="395" y="295" text-anchor="middle" font-size="10" fill="#555">2000-</text>
  <text x="395" y="308" text-anchor="middle" font-size="10" fill="#555">2007</text>

  <!-- 2008-2021 -->
  <rect x="445" y="160" width="55" height="120" fill="#dce775" rx="4"/>
  <text x="472" y="152" text-anchor="middle" font-size="12" fill="#dce775" font-weight="700">8%</text>
  <text x="472" y="295" text-anchor="middle" font-size="10" fill="#555">2008-</text>
  <text x="472" y="308" text-anchor="middle" font-size="10" fill="#555">2021</text>

  <!-- insight destacado -->
  <rect x="540" y="70" width="230" height="230" fill="none" stroke="#6ba32e" stroke-width="1.5" rx="8" stroke-dasharray="5,3"/>
  <text x="655" y="100" text-anchor="middle" font-size="14" fill="#3a6b14" font-weight="700">📊 Clave</text>
  <text x="655" y="125" text-anchor="middle" font-size="11" fill="#555">El 42% de las viviendas</text>
  <text x="655" y="142" text-anchor="middle" font-size="11" fill="#555">en España se construyeron</text>
  <text x="655" y="159" text-anchor="middle" font-size="11" fill="#555">entre 1960 y 1980</text>
  <text x="655" y="185" text-anchor="middle" font-size="11" fill="#555" font-weight="600">Sin aislamiento térmico</text>
  <text x="655" y="202" text-anchor="middle" font-size="11" fill="#555" font-weight="600">Calefacción individual</text>
  <text x="655" y="219" text-anchor="middle" font-size="11" fill="#555" font-weight="600">Ventanas de aluminio simple</text>
  <text x="655" y="245" text-anchor="middle" font-size="11" fill="#006837">= certificado energético</text>
  <text x="655" y="262" text-anchor="middle" font-size="11" fill="#006837">suele ser E, F o G</text>
  <text x="655" y="286" text-anchor="middle" font-size="10" fill="#9aab8a">(baja calificación)</text>
</svg>
