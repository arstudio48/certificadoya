<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" font-family="Outfit, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1b1b1f"/><stop offset="100%" stop-color="#2a2a30"/></linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#d4af37"/><stop offset="100%" stop-color="#c9a032"/></linearGradient>
    <linearGradient id="b1" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#a78bfa"/></linearGradient>
    <linearGradient id="b2" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#2a7ab5"/><stop offset="100%" stop-color="#3b9be5"/></linearGradient>
    <linearGradient id="b3" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#3a8f4f"/><stop offset="100%" stop-color="#4abf6a"/></linearGradient>
    <linearGradient id="b4" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#547c24"/><stop offset="100%" stop-color="#6ba32e"/></linearGradient>
    <linearGradient id="b5" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#c9a032"/><stop offset="100%" stop-color="#d4bf3a"/></linearGradient>
    <linearGradient id="b6" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#c07a30"/><stop offset="100%" stop-color="#d4993a"/></linearGradient>
    <linearGradient id="b7" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#d45530"/><stop offset="100%" stop-color="#e87a50"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity=".15"/></filter>
    <pattern id="hatch" width="8" height="8" patternUnits="userSpaceOnUse"><line x1="0" y1="8" x2="8" y2="0" stroke="#ffffff" stroke-width=".5" opacity=".08"/></pattern>
  </defs>

  <!-- Fondo oscuro -->
  <rect width="1200" height="640" fill="url(#bg)"/>
  <rect width="1200" height="640" fill="url(#hatch)"/>

  <!-- Título -->
  <text x="40" y="45" fill="#d4af37" font-size="16" font-weight="700" letter-spacing="2">02 · ANTIGÜEDAD DEL PARQUE DE VIVIENDAS</text>
  <text x="40" y="75" fill="#e8e8e8" font-size="24" font-weight="600">¿De qué época son las viviendas españolas?</text>
  <text x="40" y="98" fill="#999" font-size="13">Distribución por décadas de construcción · El 42% se construyó entre 1960 y 1980</text>
  <line x1="40" y1="108" x2="300" y2="108" stroke="#d4af37" stroke-width="2" opacity=".6"/>

  <!-- Panel principal: Gráfico de barras apiladas por décadas -->
  <g filter="url(#shadow)">
    <rect x="40" y="130" width="720" height="300" rx="12" fill="#1f1f25" stroke="#2d2d33" stroke-width="1" opacity=".95"/>
  </g>

  <!-- Barras verticales por década -->
  <!-- Eje Y -->
  <line x1="100" y1="165" x2="100" y2="395" stroke="#444" stroke-width="1"/>
  <text x="88" y="395" text-anchor="end" fill="#666" font-size="9">0%</text>
  <text x="88" y="350" text-anchor="end" fill="#666" font-size="9">5%</text>
  <text x="88" y="305" text-anchor="end" fill="#666" font-size="9">10%</text>
  <text x="88" y="260" text-anchor="end" fill="#666" font-size="9">15%</text>
  <text x="88" y="215" text-anchor="end" fill="#666" font-size="9">20%</text>
  <text x="88" y="170" text-anchor="end" fill="#666" font-size="9">25%</text>
  <!-- Líneas guía -->
  <line x1="100" y1="170" x2="740" y2="170" stroke="#2a2a30" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="100" y1="215" x2="740" y2="215" stroke="#2a2a30" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="100" y1="260" x2="740" y2="260" stroke="#2a2a30" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="100" y1="305" x2="740" y2="305" stroke="#2a2a30" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="100" y1="350" x2="740" y2="350" stroke="#2a2a30" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Datos: Antes 1900 (1%), 1900-1920 (3%), 1920-1940 (5%), 1940-1960 (10%), 1960-1980 (42%), 1980-2000 (20%), 2000-2024 (19%) -->
  <!-- Barra: Antes 1900 -->
  <rect x="115" y="380" width="70" height="15" rx="3" fill="url(#b1)" opacity=".7"/>
  <text x="150" y="395" text-anchor="middle" fill="#999" font-size="9">Antes 1900</text>
  <text x="150" y="375" text-anchor="middle" fill="#a78bfa" font-size="9" font-weight="600">1%</text>

  <!-- Barra: 1900-1920 -->
  <rect x="195" y="370" width="70" height="25" rx="3" fill="url(#b2)" opacity=".75"/>
  <text x="230" y="395" text-anchor="middle" fill="#999" font-size="9">1900-1920</text>
  <text x="230" y="365" text-anchor="middle" fill="#3b9be5" font-size="9" font-weight="600">3%</text>

  <!-- Barra: 1920-1940 -->
  <rect x="275" y="355" width="70" height="40" rx="3" fill="url(#b3)" opacity=".8"/>
  <text x="310" y="395" text-anchor="middle" fill="#999" font-size="9">1920-1940</text>
  <text x="310" y="350" text-anchor="middle" fill="#4abf6a" font-size="9" font-weight="600">5%</text>

  <!-- Barra: 1940-1960 -->
  <rect x="355" y="325" width="70" height="70" rx="3" fill="url(#b4)" opacity=".85"/>
  <text x="390" y="395" text-anchor="middle" fill="#999" font-size="9">1940-1960</text>
  <text x="390" y="320" text-anchor="middle" fill="#6ba32e" font-size="9" font-weight="600">10%</text>

  <!-- Barra: 1960-1980 (la más alta - destacada) -->
  <rect x="435" y="175" width="85" height="220" rx="3" fill="url(#gold)" opacity=".95"/>
  <rect x="435" y="175" width="85" height="220" rx="3" fill="none" stroke="#fff" stroke-width="1.5" stroke-dasharray="4,2" opacity=".5"/>
  <text x="477" y="395" text-anchor="middle" fill="#fff" font-size="9" font-weight="600">1960-1980</text>
  <text x="478" y="195" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">42%</text>

  <!-- Barra: 1980-2000 -->
  <rect x="535" y="245" width="70" height="150" rx="3" fill="url(#b6)" opacity=".85"/>
  <text x="570" y="395" text-anchor="middle" fill="#999" font-size="9">1980-2000</text>
  <text x="570" y="240" text-anchor="middle" fill="#d4993a" font-size="9" font-weight="600">20%</text>

  <!-- Barra: 2000-2024 -->
  <rect x="615" y="250" width="70" height="145" rx="3" fill="url(#b7)" opacity=".8"/>
  <text x="650" y="395" text-anchor="middle" fill="#999" font-size="9">2000-2024</text>
  <text x="650" y="245" text-anchor="middle" fill="#e87a50" font-size="9" font-weight="600">19%</text>

  <!-- Flecha destacada 1960-1980 -->
  <text x="478" y="160" text-anchor="middle" fill="#ff6b35" font-size="10" font-weight="600">▲ Máximo histórico</text>

  <!-- Panel derecho: Insights -->
  <g filter="url(#shadow)">
    <rect x="780" y="130" width="380" height="300" rx="12" fill="#1f1f25" stroke="#2d2d33" stroke-width="1" opacity=".95"/>
  </g>

  <text x="800" y="162" fill="#d4af37" font-size="13" font-weight="600" letter-spacing="1">CONCLUSIONES CLAVE</text>

  <rect x="800" y="178" width="340" height="50" rx="6" fill="#25252b" stroke="#333" stroke-width="1"/>
  <text x="815" y="195" fill="#f0c040" font-size="12" font-weight="700"> 42% del parque</text>
  <text x="815" y="215" fill="#999" font-size="10">se construyó sin ningún tipo de aislamiento térmico normativo</text>

  <rect x="800" y="238" width="340" height="50" rx="6" fill="#25252b" stroke="#333" stroke-width="1"/>
  <text x="815" y="255" fill="#f0c040" font-size="12" font-weight="700"> 80% son anteriores a 2000</text>
  <text x="815" y="275" fill="#999" font-size="10">No cumplen los estándares actuales del CTE DB-HE</text>

  <rect x="800" y="298" width="340" height="50" rx="6" fill="#25252b" stroke="#333" stroke-width="1"/>
  <text x="815" y="315" fill="#f0c040" font-size="12" font-weight="700"> Calificación E-G mayoritaria</text>
  <text x="815" y="335" fill="#999" font-size="10">La mayoría de estas viviendas obtendrán las peores letras</text>

  <text x="800" y="380" fill="#666" font-size="10">El 76% del parque anterior a 2001 no tiene certificado energético aún.</text>
  <text x="800" y="395" fill="#666" font-size="10">Fuente: INE · Censo de Viviendas 2021 · IDAE 2024</text>

  <text x="800" y="420" fill="#d4af37" font-size="11" font-weight="600">¿Qué implica para el CEE?</text>
  <text x="800" y="438" fill="#aaa" font-size="10">Cada año se emiten ~500.000 CEE nuevos en España. Con los objetivos</text>
  <text x="800" y="453" fill="#aaa" font-size="10">de la EPBD 2024 (clase E en 2030), la demanda se disparará.</text>
  <text x="800" y="473" fill="#aaa" font-size="10">Las viviendas de 1960-1980 serán las que más certificados necesiten</text>
  <text x="800" y="488" fill="#aaa" font-size="10">y las que requerirán reformas energéticas más profundas.</text>

  <!-- Pie -->
  <text x="40" y="630" fill="#555" font-size="10">Fuentes: INE · Censo de Viviendas 2021 · IDAE · Catastro · Ministerio de Transportes, Movilidad y Agenda Urbana</text>
</svg>
