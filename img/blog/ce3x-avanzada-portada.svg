<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1b1b1f"/>
      <stop offset="100%" stop-color="#141417"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4af37" stop-opacity=".15"/>
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="bar4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="520" fill="url(#bg)"/>
  <rect width="1200" height="520" fill="url(#glow)"/>

  <!-- Stars -->
  <circle cx="80" cy="60" r="1.5" fill="#fff" opacity=".3"/>
  <circle cx="350" cy="40" r="1" fill="#fff" opacity=".2"/>
  <circle cx="700" cy="30" r="1.5" fill="#fff" opacity=".25"/>
  <circle cx="1050" cy="55" r="1" fill="#fff" opacity=".2"/>
  <circle cx="1150" cy="90" r="1.5" fill="#fff" opacity=".15"/>
  <circle cx="500" cy="70" r="1" fill="#fff" opacity=".2"/>
  <circle cx="900" cy="45" r="1" fill="#fff" opacity=".3"/>

  <!-- Moon crescent -->
  <circle cx="1080" cy="70" r="28" fill="#d4af37" opacity=".12"/>
  <circle cx="1080" cy="70" r="22" fill="#d4af37" opacity=".25"/>
  <circle cx="1092" cy="62" r="18" fill="#1b1b1f"/>

  <!-- Building silhouettes -->
  <rect x="60" y="280" width="140" height="180" rx="3" fill="#2a2a30" opacity=".5"/>
  <rect x="85" y="310" width="12" height="16" rx="1" fill="#d4af37" opacity=".2"/>
  <rect x="105" y="330" width="12" height="16" rx="1" fill="#d4af37" opacity=".3"/>
  <rect x="125" y="295" width="12" height="16" rx="1" fill="#d4af37" opacity=".15"/>
  <rect x="145" y="350" width="12" height="16" rx="1" fill="#d4af37" opacity=".25"/>

  <rect x="220" y="240" width="100" height="220" rx="3" fill="#2a2a30" opacity=".4"/>
  <rect x="240" y="270" width="10" height="14" rx="1" fill="#d4af37" opacity=".2"/>
  <rect x="258" y="290" width="10" height="14" rx="1" fill="#d4af37" opacity=".25"/>
  <rect x="276" y="255" width="10" height="14" rx="1" fill="#d4af37" opacity=".15"/>

  <rect x="340" y="300" width="80" height="160" rx="3" fill="#2a2a30" opacity=".45"/>
  <rect x="355" y="330" width="10" height="14" rx="1" fill="#d4af37" opacity=".2"/>
  <rect x="373" y="345" width="10" height="14" rx="1" fill="#d4af37" opacity=".3"/>

  <rect x="440" y="260" width="120" height="200" rx="3" fill="#2a2a30" opacity=".5"/>
  <rect x="460" y="290" width="12" height="16" rx="1" fill="#d4af37" opacity=".25"/>
  <rect x="480" y="310" width="12" height="16" rx="1" fill="#d4af37" opacity=".2"/>
  <rect x="500" y="280" width="12" height="16" rx="1" fill="#d4af37" opacity=".3"/>

  <!-- Grid background element -->
  <rect x="50" y="420" width="500" height="1" fill="#d4af37" opacity=".06"/>
  <rect x="50" y="350" width="500" height="1" fill="#d4af37" opacity=".04"/>
  <rect x="50" y="280" width="500" height="1" fill="#d4af37" opacity=".04"/>

  <!-- Right side: chart bars showing improvement -->
  <text x="720" y="140" font-family="Outfit,system-ui,sans-serif" font-size="22" font-weight="700" fill="#fff">De E a C en 3 mejoras</text>

  <!-- Current bar -->
  <rect x="740" y="170" width="60" height="180" rx="4" fill="url(#bar3)" opacity=".8"/>
  <text x="770" y="340" font-family="Outfit,system-ui,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">Actual</text>
  <text x="770" y="160" font-family="Outfit,system-ui,sans-serif" font-size="20" font-weight="700" fill="#ef4444" text-anchor="middle">E</text>

  <!-- After 1st improvement -->
  <rect x="830" y="220" width="60" height="130" rx="4" fill="url(#bar2)" opacity=".8"/>
  <text x="860" y="340" font-family="Outfit,system-ui,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">SATE</text>
  <text x="860" y="210" font-family="Outfit,system-ui,sans-serif" font-size="16" font-weight="700" fill="#f59e0b" text-anchor="middle">D</text>

  <!-- After 2nd -->
  <rect x="920" y="270" width="60" height="80" rx="4" fill="url(#bar4)" opacity=".8"/>
  <text x="950" y="340" font-family="Outfit,system-ui,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">+Ventanas</text>
  <text x="950" y="260" font-family="Outfit,system-ui,sans-serif" font-size="16" font-weight="700" fill="#3b82f6" text-anchor="middle">C</text>

  <!-- After 3rd -->
  <rect x="1010" y="310" width="60" height="40" rx="4" fill="url(#bar1)" opacity=".8"/>
  <text x="1040" y="340" font-family="Outfit,system-ui,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">+Aerotermia</text>
  <text x="1040" y="302" font-family="Outfit,system-ui,sans-serif" font-size="16" font-weight="700" fill="#22c55e" text-anchor="middle">C</text>

  <!-- Arrow -->
  <path d="M790 365 L1030 365" stroke="#d4af37" stroke-width="2" opacity=".3" stroke-dasharray="4,4"/>
  <text x="910" y="380" font-family="Outfit,system-ui,sans-serif" font-size="11" fill="#d4af37" text-anchor="middle" opacity=".5">mejora progresiva</text>

  <!-- CertificadoYa Brand -->
  <rect x="48" y="448" width="32" height="32" rx="6" fill="#547c24"/>
  <text x="64" y="471" text-anchor="middle" fill="#fff" font-size="20" font-weight="700" font-family="Outfit,system-ui,sans-serif">C</text>
  <text x="92" y="468" font-family="Outfit,system-ui,sans-serif" font-size="18" font-weight="700" fill="#fff">Certificado<span style="fill:#d4af37">Ya</span></text>
  <text x="92" y="482" font-family="Outfit,system-ui,sans-serif" font-size="10" fill="#9ca3af">certificación energética de edificios existentes</text>

  <!-- Bottom tagline -->
  <text x="600" y="490" font-family="Outfit,system-ui,sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle" opacity=".5">Guía CE3X Avanzada · Casos prácticos · Errores reales · Registro CCAA</text>
</svg>