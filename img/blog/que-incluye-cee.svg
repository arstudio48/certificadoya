<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" font-family="Outfit, sans-serif">
  <defs>
    <linearGradient id="fw" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8e8e8"/>
      <stop offset="100%" stop-color="#d0d0d0"/>
    </linearGradient>
    <linearGradient id="fd" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c8b88a"/>
      <stop offset="100%" stop-color="#a8926a"/>
    </linearGradient>
    <linearGradient id="fg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8fbc8f"/>
      <stop offset="100%" stop-color="#6b9b6b"/>
    </linearGradient>
    <linearGradient id="fb" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7eb0d0"/>
      <stop offset="100%" stop-color="#5a90b0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="340" fill="#f7f9f6" rx="12"/>
  <text x="400" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#2d3a1f">¿Qué incluye el precio del certificado energético?</text>

  <!-- Barra de costes completa -->
  <!-- Fondo barra -->
  <rect x="60" y="70" width="680" height="80" fill="#eaeae5" rx="8"/>

  <!-- Bloque 1: Visita -->
  <rect x="65" y="75" width="170" height="70" fill="#3a6b14" rx="6"/>
  <text x="150" y="100" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">1. Visita técnica</text>
  <text x="150" y="118" text-anchor="middle" font-size="10" fill="#c5e1a5">Inspección presencial</text>
  <text x="150" y="136" text-anchor="middle" font-size="10" fill="#c5e1a5">Mediciones, toma de datos</text>

  <!-- Bloque 2: Software -->
  <rect x="245" y="75" width="200" height="70" fill="#5a8c24" rx="6"/>
  <text x="345" y="100" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">2. Cálculo con HULC / CE3X</text>
  <text x="345" y="118" text-anchor="middle" font-size="10" fill="#d9ef8b">Modelado energético</text>
  <text x="345" y="136" text-anchor="middle" font-size="10" fill="#d9ef8b">Etiqueta, informe, registro</text>

  <!-- Bloque 3: Gestión -->
  <rect x="455" y="75" width="180" height="70" fill="#7cb342" rx="6"/>
  <text x="545" y="100" text-anchor="middle" font-size="12" fill="#2d3a1f" font-weight="700">3. Gestión admin.</text>
  <text x="545" y="118" text-anchor="middle" font-size="10" fill="#2d3a1f">Registro autonómico</text>
  <text x="545" y="136" text-anchor="middle" font-size="10" fill="#2d3a1f">Tasas oficiales</text>

  <!-- Bloque 4: IVA -->
  <rect x="645" y="75" width="90" height="70" fill="#aed581" rx="6"/>
  <text x="690" y="100" text-anchor="middle" font-size="12" fill="#2d3a1f" font-weight="700">4. IVA</text>
  <text x="690" y="118" text-anchor="middle" font-size="10" fill="#2d3a1f">21% s/ base</text>
  <text x="690" y="136" text-anchor="middle" font-size="10" fill="#2d3a1f">incluido</text>

  <!-- Línea de flechas -->
  <text x="400" y="185" text-anchor="middle" font-size="11" fill="#9aab8a" font-weight="600">Tiempo total: 1-3 días hábiles desde la visita</text>

  <!-- Esquema inferior: 3 factores clave -->
  <text x="400" y="215" text-anchor="middle" font-size="14" font-weight="700" fill="#2d3a1f">¿De qué depende el precio final?</text>

  <!-- Factor 1: m² -->
  <rect x="30" y="230" width="220" height="90" fill="#e8f5e9" rx="8" stroke="#c5e1a5" stroke-width="1.5"/>
  <text x="140" y="255" text-anchor="middle" font-size="14" fill="#3a6b14" font-weight="700">Superficie</text>
  <text x="140" y="275" text-anchor="middle" font-size="11" fill="#555">A más metros,</text>
  <text x="140" y="291" text-anchor="middle" font-size="11" fill="#555">más trabajo de campo</text>
  <text x="140" y="310" text-anchor="middle" font-size="11" fill="#006837" font-weight="600">60 m² → ~50-80 €</text>

  <!-- Factor 2: antigüedad -->
  <rect x="290" y="230" width="220" height="90" fill="#e8f5e9" rx="8" stroke="#c5e1a5" stroke-width="1.5"/>
  <text x="400" y="255" text-anchor="middle" font-size="14" fill="#3a6b14" font-weight="700">Antigüedad</text>
  <text x="400" y="275" text-anchor="middle" font-size="11" fill="#555">Viviendas antiguas</text>
  <text x="400" y="291" text-anchor="middle" font-size="11" fill="#555">requieren más análisis</text>
  <text x="400" y="310" text-anchor="middle" font-size="11" fill="#006837" font-weight="600">Años 70 → +10-20€</text>

  <!-- Factor 3: ubicación -->
  <rect x="550" y="230" width="220" height="90" fill="#e8f5e9" rx="8" stroke="#c5e1a5" stroke-width="1.5"/>
  <text x="660" y="255" text-anchor="middle" font-size="14" fill="#3a6b14" font-weight="700">Ubicación</text>
  <text x="660" y="275" text-anchor="middle" font-size="11" fill="#555">Cada autonomía</text>
  <text x="660" y="291" text-anchor="middle" font-size="11" fill="#555">tiene sus tasas</text>
  <text x="660" y="310" text-anchor="middle" font-size="11" fill="#006837" font-weight="600">Cataluña → +15-25€</text>
</svg>
