<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" font-family="Outfit, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1b1b1f"/><stop offset="100%" stop-color="#2a2a30"/></linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#d4af37"/><stop offset="100%" stop-color="#c9a032"/></linearGradient>
    <linearGradient id="card1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#25252b"/><stop offset="100%" stop-color="#1f1f25"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity=".2"/></filter>
    <filter id="glowUp"><feDropShadow dx="0" dy="-1" stdDeviation="2" flood-color="#d4af37" flood-opacity=".4"/></filter>
    <pattern id="dot" width="20" height="20" patternUnits="userSpaceOnUse"><circle cx="10" cy="10" r="1" fill="#d4af37" opacity=".06"/></pattern>
  </defs>

  <rect width="1200" height="620" fill="url(#bg)"/>
  <rect width="1200" height="620" fill="url(#dot)"/>

  <text x="40" y="45" fill="#d4af37" font-size="16" font-weight="700" letter-spacing="2">05 · ¿QUÉ INCLUYE EL PRECIO DEL CERTIFICADO ENERGÉTICO?</text>
  <text x="40" y="75" fill="#e8e8e8" font-size="24" font-weight="600">Proceso completo, paso a paso</text>
  <text x="40" y="98" fill="#999" font-size="13">Desde la contratación hasta el certificado registrado · Desglose real del coste</text>
  <line x1="40" y1="108" x2="300" y2="108" stroke="#d4af37" stroke-width="2" opacity=".6"/>

  <!-- Timeline de proceso: 4 pasos -->
  <g filter="url(#shadow)">
    <rect x="40" y="130" width="1120" height="200" rx="12" fill="#1f1f25" stroke="#2d2d33" stroke-width="1" opacity=".95"/>
  </g>

  <text x="60" y="160" fill="#d4af37" font-size="13" font-weight="600" letter-spacing="1">EL PROCESO COMPLETO (1-3 DÍAS)</text>

  <!-- Línea temporal horizontal -->
  <line x1="150" y1="210" x2="1050" y2="210" stroke="#333" stroke-width="2"/>
  <line x1="150" y1="210" x2="1050" y2="210" stroke="url(#gold)" stroke-width="2" stroke-dasharray="0, 900, 225, 900" stroke-linecap="round"/>

  <!-- Paso 1 -->
  <circle cx="150" cy="210" r="18" fill="#d4af37"/>
  <text x="150" y="216" text-anchor="middle" fill="#1b1b1f" font-size="14" font-weight="700">1</text>
  <g filter="url(#shadow)">
    <rect x="80" y="245" width="140" height="70" rx="8" fill="url(#card1)" stroke="#d4af37" stroke-width=".5"/>
  </g>
  <text x="150" y="266" text-anchor="middle" fill="#d4af37" font-size="11" font-weight="600">Contratación</text>
  <text x="150" y="282" text-anchor="middle" fill="#888" font-size="9">Reserva online</text>
  <text x="150" y="296" text-anchor="middle" fill="#888" font-size="9">Confirmación 24-48h</text>

  <!-- Paso 2 -->
  <circle cx="390" cy="210" r="18" fill="#25252b" stroke="#4abf6a" stroke-width="2"/>
  <text x="390" y="216" text-anchor="middle" fill="#4abf6a" font-size="14" font-weight="700">2</text>
  <g filter="url(#shadow)">
    <rect x="320" y="245" width="140" height="70" rx="8" fill="url(#card1)" stroke="#4abf6a" stroke-width=".5"/>
  </g>
  <text x="390" y="266" text-anchor="middle" fill="#4abf6a" font-size="11" font-weight="600">Visita técnica</text>
  <text x="390" y="282" text-anchor="middle" fill="#888" font-size="9">Medición de estancias</text>
  <text x="390" y="296" text-anchor="middle" fill="#888" font-size="9">30-60 minutos</text>

  <!-- Paso 3 -->
  <circle cx="630" cy="210" r="18" fill="#25252b" stroke="#2a7ab5" stroke-width="2"/>
  <text x="630" y="216" text-anchor="middle" fill="#2a7ab5" font-size="14" font-weight="700">3</text>
  <g filter="url(#shadow)">
    <rect x="560" y="245" width="140" height="70" rx="8" fill="url(#card1)" stroke="#2a7ab5" stroke-width=".5"/>
  </g>
  <text x="630" y="266" text-anchor="middle" fill="#2a7ab5" font-size="11" font-weight="600">Cálculo CE3X</text>
  <text x="630" y="282" text-anchor="middle" fill="#888" font-size="9">Modelado energético</text>
  <text x="630" y="296" text-anchor="middle" fill="#888" font-size="9">Informe + etiqueta</text>

  <!-- Paso 4 -->
  <circle cx="870" cy="210" r="18" fill="#25252b" stroke="#d45530" stroke-width="2"/>
  <text x="870" y="216" text-anchor="middle" fill="#d45530" font-size="14" font-weight="700">4</text>
  <g filter="url(#shadow)">
    <rect x="800" y="245" width="140" height="70" rx="8" fill="url(#card1)" stroke="#d45530" stroke-width=".5"/>
  </g>
  <text x="870" y="266" text-anchor="middle" fill="#d45530" font-size="11" font-weight="600">Registro</text>
  <text x="870" y="282" text-anchor="middle" fill="#888" font-size="9">En CCAA correspondiente</text>
  <text x="870" y="296" text-anchor="middle" fill="#888" font-size="9">Entrega documento</text>

  <!-- Flechas entre pasos -->
  <text x="245" y="214" text-anchor="middle" fill="#555" font-size="16">→</text>
  <text x="495" y="214" text-anchor="middle" fill="#555" font-size="16">→</text>
  <text x="740" y="214" text-anchor="middle" fill="#555" font-size="16">→</text>

  <!-- Flecha final resultado -->
  <text x="980" y="214" fill="#d4af37" font-size="14" font-weight="700">→</text>
  <circle cx="1015" cy="210" r="16" fill="#d4af37" opacity=".2"/>
  <text x="1015" y="216" text-anchor="middle" fill="#d4af37" font-size="16">✓</text>

  <!-- Panel inferior: desglose de costes real -->
  <g filter="url(#shadow)">
    <rect x="40" y="340" width="720" height="260" rx="12" fill="#1f1f25" stroke="#2d2d33" stroke-width="1" opacity=".95"/>
  </g>

  <text x="60" y="372" fill="#d4af37" font-size="13" font-weight="600" letter-spacing="1">DESGLOSE REAL DEL PRECIO PARA VIVIENDA TIPO (97 m², bloque años 70)</text>

  <!-- Barra de costes desglosada -->
  <rect x="60" y="392" width="680" height="50" rx="8" fill="#25252b" stroke="#333" stroke-width="1"/>

  <!-- 1: Visita 35% -->
  <rect x="65" y="396" width="238" height="42" rx="6" fill="#3d5a1e"/>
  <text x="184" y="416" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Visita técnica</text>
  <text x="184" y="432" text-anchor="middle" fill="#a0c87a" font-size="10">~35% (24,50 €)</text>

  <!-- 2: Cálculo 30% -->
  <rect x="307" y="396" width="204" height="42" rx="6" fill="#2a6e3b"/>
  <text x="409" y="416" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Cálculo CE3X</text>
  <text x="409" y="432" text-anchor="middle" fill="#7fc48f" font-size="10">~30% (21,00 €)</text>

  <!-- 3: Tasa autonómica 25% -->
  <rect x="515" y="396" width="170" height="42" rx="6" fill="#547c24"/>
  <text x="600" y="416" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Tasas CCAA</text>
  <text x="600" y="432" text-anchor="middle" fill="#9ec45e" font-size="10">~25% (17,50 €)</text>

  <!-- 4: Gestión 10% -->
  <rect x="689" y="396" width="47" height="42" rx="6" fill="#7ba82e"/>
  <text x="712" y="416" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">Gest.</text>
  <text x="712" y="432" text-anchor="middle" fill="#c4e080" font-size="9">~10% (7€)</text>

  <!-- Tabla detalle -->
  <rect x="60" y="458" width="680" height="24" rx="4" fill="#25252b" stroke="#333" stroke-width=".5"/>
  <text x="75" y="475" fill="#999" font-size="9" font-weight="600">Concepto</text>
  <text x="300" y="475" fill="#999" font-size="9" font-weight="600">%</text>
  <text x="440" y="475" fill="#999" font-size="9" font-weight="600">Vivienda tipo</text>
  <text x="580" y="475" fill="#999" font-size="9" font-weight="600">Piso pequeño</text>
  <text x="700" y="475" text-anchor="end" fill="#999" font-size="9" font-weight="600">Unifamiliar</text>

  <line x1="60" y1="482" x2="740" y2="482" stroke="#333" stroke-width=".5"/>
  <text x="75" y="498" fill="#ccc" font-size="11">Visita + desplazamiento</text>
  <text x="300" y="498" fill="#aaa" font-size="11">35%</text>
  <text x="460" y="498" fill="#d4af37" font-size="11" font-weight="600">24,50 €</text>
  <text x="600" y="498" fill="#ccc" font-size="11">20,00 €</text>
  <text x="700" y="498" text-anchor="end" fill="#ccc" font-size="11">30,00 €</text>

  <line x1="60" y1="505" x2="740" y2="505" stroke="#333" stroke-width=".5"/>
  <text x="75" y="521" fill="#ccc" font-size="11">Cálculo + software CE3X</text>
  <text x="300" y="521" fill="#aaa" font-size="11">30%</text>
  <text x="460" y="521" fill="#d4af37" font-size="11" font-weight="600">21,00 €</text>
  <text x="600" y="521" fill="#ccc" font-size="11">15,00 €</text>
  <text x="700" y="521" text-anchor="end" fill="#ccc" font-size="11">28,00 €</text>

  <line x1="60" y1="528" x2="740" y2="528" stroke="#333" stroke-width=".5"/>
  <text x="75" y="544" fill="#ccc" font-size="11">Tasa autonómica de registro</text>
  <text x="300" y="544" fill="#aaa" font-size="11">25%</text>
  <text x="460" y="544" fill="#d4af37" font-size="11" font-weight="600">17,50 €</text>
  <text x="600" y="544" fill="#ccc" font-size="11">12,00 €</text>
  <text x="700" y="544" text-anchor="end" fill="#ccc" font-size="11">25,00 €</text>

  <line x1="60" y1="551" x2="740" y2="551" stroke="#333" stroke-width=".5"/>
  <text x="75" y="567" fill="#ccc" font-size="11">Gestión administrativa</text>
  <text x="300" y="567" fill="#aaa" font-size="11">10%</text>
  <text x="460" y="567" fill="#d4af37" font-size="11" font-weight="600">7,00 €</text>
  <text x="600" y="567" fill="#ccc" font-size="11">5,00 €</text>
  <text x="700" y="567" text-anchor="end" fill="#ccc" font-size="11">10,00 €</text>

  <line x1="60" y1="574" x2="740" y2="574" stroke="#d4af37" stroke-width="1" opacity=".5"/>
  <text x="75" y="590" fill="#d4af37" font-size="12" font-weight="700">Total (sin IVA)</text>
  <text x="300" y="590" fill="#d4af37" font-size="11">100%</text>
  <text x="460" y="590" fill="#d4af37" font-size="13" font-weight="700">70,00 €</text>
  <text x="600" y="590" fill="#d4af37" font-size="12" font-weight="600">52,00 €</text>
  <text x="700" y="590" text-anchor="end" fill="#d4af37" font-size="12" font-weight="600">93,00 €</text>

  <!-- Panel derecho: factores que afectan -->
  <g filter="url(#shadow)">
    <rect x="780" y="340" width="380" height="260" rx="12" fill="#1f1f25" stroke="#d4af37" stroke-width="1" opacity=".95"/>
  </g>

  <text x="800" y="372" fill="#d4af37" font-size="13" font-weight="600" letter-spacing="1">FACTORES QUE AFECTAN AL PRECIO</text>

  <rect x="800" y="388" width="340" height="36" rx="6" fill="#25252b" stroke="#333" stroke-width=".5"/>
  <text x="815" y="412" fill="#ccc" font-size="11"><tspan fill="#d4af37" font-weight="600">Superficie:</tspan> +10 € por cada 20 m² adicionales</text>

  <rect x="800" y="430" width="340" height="36" rx="6" fill="#25252b" stroke="#333" stroke-width=".5"/>
  <text x="815" y="454" fill="#ccc" font-size="11"><tspan fill="#d4af37" font-weight="600">Antigüedad:</tspan> +5-15 € si es anterior a 1980</text>

  <rect x="800" y="472" width="340" height="36" rx="6" fill="#25252b" stroke="#333" stroke-width=".5"/>
  <text x="815" y="496" fill="#ccc" font-size="11"><tspan fill="#d4af37" font-weight="600">Urgencia:</tspan> +10-15 € si se necesita en menos de 24 h</text>

  <rect x="800" y="514" width="340" height="36" rx="6" fill="#25252b" stroke="#333" stroke-width=".5"/>
  <text x="815" y="538" fill="#ccc" font-size="11"><tspan fill="#d4af37" font-weight="600">Tasas autonómicas:</tspan> varían 10-60 € según la CCAA</text>

  <rect x="800" y="556" width="340" height="36" rx="6" fill="#25252b" stroke="#333" stroke-width=".5"/>
  <text x="815" y="580" fill="#ccc" font-size="11"><tspan fill="#d4af37" font-weight="600">Desplazamiento:</tspan> +5-20 € si el municipio está lejos</text>

  <text x="40" y="618" fill="#555" font-size="10">Fuente: CertificadoYa · Basado en +500 CEE gestionados en 2025-2026. Precios sin IVA ni tasas autonómicas variables.</text>
</svg>
