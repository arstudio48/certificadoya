<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a365d"/>
      <stop offset="100%" style="stop-color:#2d6a4f"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#a5d6a7"/>
    </linearGradient>
    <linearGradient id="euroGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <linearGradient id="houseGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#81c784"/>
      <stop offset="100%" style="stop-color:#4caf50"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>
  
  <!-- Abstract decorative circles -->
  <circle cx="120" cy="80" r="60" fill="white" opacity="0.04"/>
  <circle cx="680" cy="420" r="80" fill="white" opacity="0.04"/>
  <circle cx="650" cy="100" r="40" fill="white" opacity="0.03"/>
  <circle cx="150" cy="430" r="50" fill="white" opacity="0.03"/>
  
  <!-- Grid pattern suggestion -->
  <g stroke="white" stroke-opacity="0.04" stroke-width="1" fill="none">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
  </g>

  <!-- ====== SHIELD (centered) ====== -->
  <g filter="url(#shadow)" transform="translate(400, 220)">
    <!-- Shield outer shape -->
    <path d="M0 -160 L120 -120 L120 40 Q120 120 0 170 Q-120 120 -120 40 L-120 -120 Z" 
          fill="url(#shieldGrad)" stroke="#4caf50" stroke-width="3" opacity="0.95"/>
    <!-- Shield inner border -->
    <path d="M0 -140 L100 -105 L100 30 Q100 100 0 145 Q-100 100 -100 30 L-100 -105 Z" 
          fill="none" stroke="#66bb6a" stroke-width="1.5" opacity="0.5"/>
    
    <!-- Euro symbol on shield -->
    <circle cx="0" cy="-30" r="40" fill="url(#euroGrad)" filter="url(#glow)"/>
    <text x="0" y="-18" text-anchor="middle" fill="#1a365d" font-size="36" font-weight="bold" font-family="Arial, sans-serif">€</text>
    
    <!-- "9.099 M" text -->
    <text x="0" y="30" text-anchor="middle" fill="#1a365d" font-size="22" font-weight="bold" font-family="Arial, sans-serif">9.099 M</text>
    
    <!-- Sparkle dots around euro -->
    <circle cx="-50" cy="-50" r="3" fill="#fbbf24" opacity="0.8"/>
    <circle cx="50" cy="-55" r="2.5" fill="#fbbf24" opacity="0.7"/>
    <circle cx="-55" cy="-20" r="2" fill="#fbbf24" opacity="0.6"/>
    <circle cx="55" cy="-25" r="2.5" fill="#fbbf24" opacity="0.7"/>
  </g>

  <!-- ====== HOUSE left side ====== -->
  <g filter="url(#shadow)" transform="translate(170, 230)">
    <!-- House body -->
    <rect x="-50" y="-30" width="100" height="80" rx="3" fill="url(#houseGrad)" stroke="#388e3c" stroke-width="2"/>
    <!-- Roof -->
    <polygon points="-65,-30 0,-80 65,-30" fill="#2e7d32" stroke="#1b5e20" stroke-width="2"/>
    <!-- Door -->
    <rect x="-15" y="10" width="30" height="40" rx="2" fill="#1b5e20"/>
    <!-- Windows -->
    <rect x="-40" y="-15" width="22" height="22" rx="2" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <rect x="18" y="-15" width="22" height="22" rx="2" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <!-- Sun on house -->
    <circle cx="0" cy="-55" r="15" fill="#fbbf24" opacity="0.6"/>
    <g stroke="#fbbf24" stroke-width="1.5" opacity="0.5">
      <line x1="0" y1="-75" x2="0" y2="-80"/>
      <line x1="20" y1="-65" x2="24" y2="-68"/>
      <line x1="-20" y1="-65" x2="-24" y2="-68"/>
    </g>
    <!-- Energy waves from house -->
    <path d="M55 -10 Q70 -5 55 5 Q70 10 55 20" fill="none" stroke="#a5d6a7" stroke-width="2" opacity="0.6"/>
    <path d="M60 -15 Q78 -8 60 0 Q78 8 60 18" fill="none" stroke="#a5d6a7" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- ====== PEOPLE right side, under shield ====== -->
  <g transform="translate(600, 310)">
    <!-- Person 1 - adult -->
    <circle cx="0" cy="-30" r="14" fill="#e8f5e9" stroke="#4caf50" stroke-width="1.5"/>
    <path d="M0 -15 L0 20 M0 0 L-20 20 M0 0 L20 20 M0 15 L-15 35 M0 15 L15 35" 
          stroke="#e8f5e9" stroke-width="3" stroke-linecap="round" fill="none"/>
    
    <!-- Person 2 - child/teen -->
    <circle cx="-30" cy="-20" r="10" fill="#e8f5e9" stroke="#66bb6a" stroke-width="1.5"/>
    <path d="M-30 -10 L-30 12 M-30 0 L-45 15 M-30 0 L-15 15 M-30 12 L-40 25 M-30 12 L-20 25" 
          stroke="#e8f5e9" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    
    <!-- Person 3 - adult -->
    <circle cx="30" cy="-25" r="12" fill="#e8f5e9" stroke="#66bb6a" stroke-width="1.5"/>
    <path d="M30 -13 L30 16 M30 0 L15 18 M30 0 L45 18 M30 12 L20 30 M30 12 L40 30" 
          stroke="#e8f5e9" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  </g>

  <!-- ====== Protection arc from shield to people ====== -->
  <path d="M450 180 Q530 120 630 180" fill="none" stroke="#81c784" stroke-width="2" opacity="0.3" stroke-dasharray="6,4"/>
  <path d="M460 195 Q530 140 620 195" fill="none" stroke="#a5d6a7" stroke-width="1.5" opacity="0.2" stroke-dasharray="4,4"/>

  <!-- ====== Bottom badge ====== -->
  <g transform="translate(400, 460)">
    <rect x="-140" y="-15" width="280" height="30" rx="15" fill="#2d6a4f" stroke="#4caf50" stroke-width="1" opacity="0.8"/>
    <text x="0" y="5" text-anchor="middle" fill="#e8f5e9" font-size="13" font-weight="600" font-family="Arial, sans-serif" letter-spacing="1">PLAN SOCIAL DEL CLIMA · AYUDAS 2026</text>
  </g>
</svg>