
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg3)"/>
  <!-- Storefront -->
  <rect x="250" y="80" width="300" height="280" rx="8" fill="white" stroke="#547c24" stroke-width="3"/>
  <!-- Roof -->
  <polygon points="230,80 570,80 550,60 250,60" fill="#547c24"/>
  <!-- Door -->
  <rect x="360" y="210" width="80" height="150" rx="4" fill="#1e3a5f"/>
  <circle cx="425" cy="290" r="4" fill="#fbbf24"/>
  <!-- Windows -->
  <rect x="275" y="120" width="65" height="70" rx="4" fill="#bfdbfe" stroke="#93c5fd" stroke-width="2"/>
  <rect x="460" y="120" width="65" height="70" rx="4" fill="#bfdbfe" stroke="#93c5fd" stroke-width="2"/>
  <line x1="307" y1="120" x2="307" y2="190" stroke="#93c5fd" stroke-width="1.5"/>
  <line x1="275" y1="155" x2="340" y2="155" stroke="#93c5fd" stroke-width="1.5"/>
  <line x1="492" y1="120" x2="492" y2="190" stroke="#93c5fd" stroke-width="1.5"/>
  <line x1="460" y1="155" x2="525" y2="155" stroke="#93c5fd" stroke-width="1.5"/>
  <!-- Sign -->
  <rect x="300" y="370" width="200" height="30" rx="6" fill="#16a34a"/>
  <text x="400" y="391" text-anchor="middle" fill="white" font-size="14" font-weight="bold" font-family="sans-serif">ABIERTO</text>
  <!-- Pavement -->
  <rect x="0" y="380" width="800" height="70" fill="#e5e7eb"/>
  <line x1="200" y1="390" x2="200" y2="450" stroke="#d1d5db" stroke-width="1"/>
  <line x1="600" y1="390" x2="600" y2="450" stroke="#d1d5db" stroke-width="1"/>
</svg>