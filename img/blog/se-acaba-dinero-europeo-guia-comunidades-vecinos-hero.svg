<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a365d"/>
      <stop offset="100%" style="stop-color:#2d6a4f"/>
    </linearGradient>
    <linearGradient id="coinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="windowGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fef9c3"/>
      <stop offset="100%" style="stop-color:#fde047"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="12"/>
  
  <!-- Abstract background shapes -->
  <circle cx="700" cy="80" r="120" fill="white" opacity="0.03"/>
  <circle cx="100" cy="420" r="100" fill="white" opacity="0.03"/>
  <circle cx="650" cy="450" r="80" fill="white" opacity="0.04"/>
  
  <!-- Ground -->
  <rect x="0" y="410" width="800" height="90" fill="#0d2818" opacity="0.5" rx="0"/>
  <rect x="0" y="420" width="800" height="80" fill="#1a3a2a" opacity="0.6"/>
  
  <!-- Building body -->
  <rect x="220" y="100" width="220" height="320" rx="4" fill="#2d3748" opacity="0.85"/>
  <rect x="225" y="105" width="210" height="310" rx="3" fill="#3d4a5e" opacity="0.5"/>
  
  <!-- Roof -->
  <polygon points="205,100 330,55 455,100" fill="#2d3748" stroke="#4a5568" stroke-width="1"/>
  <polygon points="210,100 330,60 450,100" fill="#4a5568" opacity="0.3"/>
  
  <!-- Building windows row 1 -->
  <rect x="250" y="130" width="35" height="45" rx="3" fill="#1a202c" stroke="#4a5568" stroke-width="1.5"/>
  <rect x="250" y="130" width="35" height="45" rx="3" fill="url(#windowGlow)" opacity="0.7"/>
  <rect x="305" y="130" width="35" height="45" rx="3" fill="#1a202c" stroke="#4a5568" stroke-width="1.5"/>
  <rect x="305" y="130" width="35" height="45" rx="3" fill="url(#windowGlow)" opacity="0.5"/>
  <rect x="360" y="130" width="35" height="45" rx="3" fill="#1a202c" stroke="#4a5568" stroke-width="1.5"/>
  <rect x="360" y="130" width="35" height="45" rx="3" fill="url(#windowGlow)" opacity="0.6"/>
  
  <!-- Building windows row 2 -->
  <rect x="250" y="200" width="35" height="45" rx="3" fill="#1a202c" stroke="#4a5568" stroke-width="1.5"/>
  <rect x="250" y="200" width="35" height="45" rx="3" fill="url(#windowGlow)" opacity="0.5"/>
  <rect x="305" y="200" width="35" height="45" rx="3" fill="#1a202c" stroke="#4a5568" stroke-width="1.5"/>
  <rect x="305" y="200" width="35" height="45" rx="3" fill="url(#windowGlow)" opacity="0.8"/>
  <rect x="360" y="200" width="35" height="45" rx="3" fill="#1a202c" stroke="#4a5568" stroke-width="1.5"/>
  
  <!-- Building windows row 3 -->
  <rect x="250" y="270" width="35" height="45" rx="3" fill="#1a202c" stroke="#4a5568" stroke-width="1.5"/>
  <rect x="250" y="270" width="35" height="45" rx="3" fill="url(#windowGlow)" opacity="0.4"/>
  <rect x="305" y="270" width="35" height="45" rx="3" fill="#1a202c" stroke="#4a5568" stroke-width="1.5"/>
  <rect x="360" y="270" width="35" height="45" rx="3" fill="#1a202c" stroke="#4a5568" stroke-width="1.5"/>
  <rect x="360" y="270" width="35" height="45" rx="3" fill="url(#windowGlow)" opacity="0.6"/>
  
  <!-- Building door -->
  <rect x="295" y="350" width="50" height="70" rx="4" fill="#1a202c" stroke="#4a5568" stroke-width="1.5"/>
  <rect x="295" y="350" width="50" height="70" rx="4" fill="#4a5568" opacity="0.5"/>
  <circle cx="335" cy="388" r="3" fill="#fbbf24"/>
  
  <!-- Building next to it (smaller) -->
  <rect x="170" y="180" width="60" height="240" rx="3" fill="#2d3748" opacity="0.6"/>
  <rect x="175" y="185" width="50" height="230" rx="2" fill="#3d4a5e" opacity="0.3"/>
  <polygon points="165,180 200,140 235,180" fill="#2d3748" opacity="0.6"/>
  <!-- Windows on smaller building -->
  <rect x="185" y="200" width="25" height="30" rx="2" fill="#1a202c" stroke="#4a5568" stroke-width="1"/>
  <rect x="185" y="260" width="25" height="30" rx="2" fill="#1a202c" stroke="#4a5568" stroke-width="1"/>
  
  <!-- Family/community group in front of building -->
  <!-- Person 1 (left) -->
  <circle cx="380" cy="380" r="10" fill="#fbbf24" opacity="0.8"/>
  <rect x="375" y="388" width="10" height="22" rx="3" fill="#fbbf24" opacity="0.6"/>
  <line x1="375" y1="395" x2="368" y2="408" stroke="#fbbf24" stroke-width="2" opacity="0.6"/>
  <line x1="385" y1="395" x2="392" y2="408" stroke="#fbbf24" stroke-width="2" opacity="0.6"/>
  
  <!-- Person 2 (center - child) -->
  <circle cx="395" cy="390" r="7" fill="#fde047" opacity="0.7"/>
  <rect x="391" y="396" width="8" height="15" rx="3" fill="#fde047" opacity="0.5"/>
  
  <!-- Person 3 (right) -->
  <circle cx="410" cy="385" r="10" fill="#fbbf24" opacity="0.8"/>
  <rect x="405" y="393" width="10" height="20" rx="3" fill="#fbbf24" opacity="0.6"/>
  <line x1="405" y1="400" x2="398" y2="413" stroke="#fbbf24" stroke-width="2" opacity="0.6"/>
  <line x1="415" y1="400" x2="422" y2="413" stroke="#fbbf24" stroke-width="2" opacity="0.6"/>
  
  <!-- Falling euro coins - scattered, symbolizing money running out -->
  <!-- Coin 1 - top left -->
  <g filter="url(#glow)">
    <circle cx="280" cy="80" r="12" fill="url(#coinGrad)" opacity="0.9"/>
    <text x="280" y="85" text-anchor="middle" fill="#92400e" font-size="12" font-weight="bold" font-family="Arial">€</text>
  </g>
  <!-- Coin 2 -->
  <g filter="url(#glow)">
    <circle cx="350" cy="70" r="10" fill="url(#coinGrad)" opacity="0.7"/>
    <text x="350" y="75" text-anchor="middle" fill="#92400e" font-size="10" font-weight="bold" font-family="Arial">€</text>
  </g>
  <!-- Coin 3 -->
  <g filter="url(#glow)">
    <circle cx="430" cy="90" r="11" fill="url(#coinGrad)" opacity="0.8"/>
    <text x="430" y="95" text-anchor="middle" fill="#92400e" font-size="11" font-weight="bold" font-family="Arial">€</text>
  </g>
  <!-- Coin 4 - mid falling -->
  <g filter="url(#glow)">
    <circle cx="260" cy="160" r="9" fill="url(#coinGrad)" opacity="0.6"/>
    <text x="260" y="165" text-anchor="middle" fill="#92400e" font-size="9" font-weight="bold" font-family="Arial">€</text>
  </g>
  <!-- Coin 5 -->
  <g filter="url(#glow)">
    <circle cx="370" cy="150" r="8" fill="url(#coinGrad)" opacity="0.5"/>
    <text x="370" y="155" text-anchor="middle" fill="#92400e" font-size="8" font-weight="bold" font-family="Arial">€</text>
  </g>
  <!-- Coin 6 - almost on the ground -->
  <g filter="url(#glow)">
    <circle cx="310" cy="380" r="7" fill="url(#coinGrad)" opacity="0.4"/>
    <text x="310" y="384" text-anchor="middle" fill="#92400e" font-size="7" font-weight="bold" font-family="Arial">€</text>
  </g>
  <!-- Coin 7 -->
  <g filter="url(#glow)">
    <circle cx="450" cy="180" r="9" fill="url(#coinGrad)" opacity="0.6"/>
    <text x="450" y="185" text-anchor="middle" fill="#92400e" font-size="9" font-weight="bold" font-family="Arial">€</text>
  </g>
  <!-- Coin 8 -->
  <g filter="url(#glow)">
    <circle cx="240" cy="290" r="8" fill="url(#coinGrad)" opacity="0.4"/>
    <text x="240" y="295" text-anchor="middle" fill="#92400e" font-size="8" font-weight="bold" font-family="Arial">€</text>
  </g>
  <!-- Coin 9 -->
  <g filter="url(#glow)">
    <circle cx="420" cy="310" r="7" fill="url(#coinGrad)" opacity="0.35"/>
    <text x="420" y="314" text-anchor="middle" fill="#92400e" font-size="7" font-weight="bold" font-family="Arial">€</text>
  </g>
  
  <!-- Empty coin outline fading away -->
  <circle cx="500" cy="120" r="14" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.2" stroke-dasharray="4,3"/>
  <text x="500" y="126" text-anchor="middle" fill="#fbbf24" font-size="14" font-weight="bold" font-family="Arial" opacity="0.2">€</text>
  
  <circle cx="150" cy="200" r="10" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.15" stroke-dasharray="3,3"/>
  <text x="150" y="205" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="bold" font-family="Arial" opacity="0.15">€</text>
  
  <!-- Text overlay -->
  <text x="580" y="200" text-anchor="middle" fill="white" font-size="18" font-weight="600" font-family="Outfit, Arial, sans-serif" opacity="0.12">AGOSTO</text>
  <text x="580" y="220" text-anchor="middle" fill="white" font-size="22" font-weight="700" font-family="Outfit, Arial, sans-serif" opacity="0.08">2026</text>
  
  <!-- Small decorative elements - leaves/sustainability -->
  <g opacity="0.15">
    <path d="M600 350 Q610 330 620 340 Q610 345 600 350Z" fill="#66bb6a"/>
    <path d="M630 360 Q640 340 650 350 Q640 355 630 360Z" fill="#81c784"/>
    <path d="M615 370 Q620 355 630 360 Q625 365 615 370Z" fill="#66bb6a"/>
  </g>
  
  <!-- Energy efficiency badge -->
  <g transform="translate(460, 345)" opacity="0.15">
    <rect x="0" y="0" width="40" height="35" rx="4" fill="#2e7d32"/>
    <text x="20" y="25" text-anchor="middle" fill="white" font-size="18" font-weight="bold" font-family="Arial">A</text>
  </g>
</svg>