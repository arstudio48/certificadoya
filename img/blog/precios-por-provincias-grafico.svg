<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <rect width="800" height="500" fill="#1a5c2e"/>
  <rect x="0" y="0" width="800" height="500" fill="url(#g)" opacity="0.3"/>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="800" y2="500">
      <stop offset="0%" stop-color="#2e8b47"/>
      <stop offset="100%" stop-color="#0d3b1a"/>
    </linearGradient>
  </defs>
  <!-- Chart area -->
  <rect x="100" y="80" width="600" height="340" rx="12" fill="white" opacity="0.95"/>
  <!-- Title -->
  <text x="400" y="115" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#1a5c2e">Comparativa de precios CEE por provincia</text>
  <!-- Bars -->
  <rect x="140" y="360" width="40" height="0" fill="#d4af37" rx="3"><animate attributeName="height" from="0" to="120" dur="0.8s" fill="freeze"/></rect>
  <rect x="140" y="240" width="40" height="120" fill="#d4af37" rx="3"/>
  <rect x="210" y="360" width="40" height="0" fill="#b8942f" rx="3"><animate attributeName="height" from="0" to="180" dur="0.8s" fill="freeze"/></rect>
  <rect x="210" y="180" width="40" height="180" fill="#b8942f" rx="3"/>
  <rect x="280" y="360" width="40" height="0" fill="#d4af37" rx="3"><animate attributeName="height" from="0" to="90" dur="0.8s" fill="freeze"/></rect>
  <rect x="280" y="270" width="40" height="90" fill="#d4af37" rx="3"/>
  <rect x="350" y="360" width="40" height="0" fill="#b8942f" rx="3"><animate attributeName="height" from="0" to="160" dur="0.8s" fill="freeze"/></rect>
  <rect x="350" y="200" width="40" height="160" fill="#b8942f" rx="3"/>
  <rect x="420" y="360" width="40" height="0" fill="#d4af37" rx="3"><animate attributeName="height" from="0" to="210" dur="0.8s" fill="freeze"/></rect>
  <rect x="420" y="150" width="40" height="210" fill="#d4af37" rx="3"/>
  <!-- Axis -->
  <line x1="100" y1="370" x2="700" y2="370" stroke="#ccc" stroke-width="1"/>
  <line x1="100" y1="80" x2="100" y2="420" stroke="#ccc" stroke-width="1"/>
  <!-- Labels -->
  <text x="160" y="395" text-anchor="middle" font-family="system-ui" font-size="11" fill="#666">Madrid</text>
  <text x="230" y="395" text-anchor="middle" font-family="system-ui" font-size="11" fill="#666">Barna</text>
  <text x="300" y="395" text-anchor="middle" font-family="system-ui" font-size="11" fill="#666">Valencia</text>
  <text x="370" y="395" text-anchor="middle" font-family="system-ui" font-size="11" fill="#666">Sevilla</text>
  <text x="440" y="395" text-anchor="middle" font-family="system-ui" font-size="11" fill="#666">Gijón</text>
  <!-- Euro sign -->
  <text x="80" y="100" text-anchor="end" font-family="system-ui" font-size="12" fill="#999">€</text>
  <!-- Data labels -->
  <text x="160" y="235" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#333">120€</text>
  <text x="230" y="175" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#333">180€</text>
  <text x="300" y="265" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#333">90€</text>
  <text x="370" y="195" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#333">160€</text>
  <text x="440" y="145" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#333">210€</text>
  <!-- Footer note -->
  <text x="400" y="445" text-anchor="middle" font-family="system-ui" font-size="13" fill="white">Precio medio del certificado energético por provincia en 2026</text>
</svg>
