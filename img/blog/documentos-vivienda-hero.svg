<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f2fe;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f0fdf4;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="house" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#16a34a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#15803d;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="doc1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f8fafc"/>
    </linearGradient>
    <linearGradient id="doc2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fefce8"/>
      <stop offset="100%" style="stop-color:#fef9c3"/>
    </linearGradient>
    <linearGradient id="stamp" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:.8"/>
      <stop offset="100%" style="stop-color:#b91c1c;stop-opacity:.8"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-opacity=".12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#sky)" rx="16"/>
  
  <!-- Subtle grid pattern -->
  <g opacity=".04">
    <line x1="0" y1="100" x2="800" y2="100" stroke="#166534" stroke-width="1"/>
    <line x1="0" y1="200" x2="800" y2="200" stroke="#166534" stroke-width="1"/>
    <line x1="0" y1="300" x2="800" y2="300" stroke="#166534" stroke-width="1"/>
    <line x1="0" y1="400" x2="800" y2="400" stroke="#166534" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="500" stroke="#166534" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="500" stroke="#166534" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="500" stroke="#166534" stroke-width="1"/>
  </g>

  <!-- Ground -->
  <rect x="0" y="400" width="800" height="100" fill="#e8f5e9" opacity=".6"/>

  <!-- House -->
  <g filter="url(#shadow)">
    <!-- House body -->
    <rect x="180" y="220" width="240" height="180" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
    <!-- Roof -->
    <polygon points="160,225 300,100 440,225" fill="url(#house)" stroke="#15803d" stroke-width="2"/>
    <polygon points="160,225 300,100 440,225" fill="none" stroke="#14532d" stroke-width="2" opacity=".3"/>
    <!-- Door -->
    <rect x="265" y="310" width="50" height="90" rx="4" fill="#92400e" stroke="#78350f" stroke-width="2"/>
    <circle cx="305" cy="360" r="3" fill="#fbbf24"/>
    <!-- Windows -->
    <rect x="200" y="260" width="50" height="50" rx="3" fill="#e0f2fe" stroke="#94a3b8" stroke-width="2"/>
    <line x1="225" y1="260" x2="225" y2="310" stroke="#94a3b8" stroke-width="1.5"/>
    <line x1="200" y1="285" x2="250" y2="285" stroke="#94a3b8" stroke-width="1.5"/>
    <rect x="330" y="260" width="50" height="50" rx="3" fill="#e0f2fe" stroke="#94a3b8" stroke-width="2"/>
    <line x1="355" y1="260" x2="355" y2="310" stroke="#94a3b8" stroke-width="1.5"/>
    <line x1="330" y1="285" x2="380" y2="285" stroke="#94a3b8" stroke-width="1.5"/>
  </g>

  <!-- Document 1: Cédula de Habitabilidad (left) -->
  <g filter="url(#shadow)" transform="translate(70, 180) rotate(-7)">
    <rect x="0" y="0" width="100" height="130" rx="3" fill="url(#doc1)" stroke="#cbd5e1" stroke-width="1.5"/>
    <rect x="8" y="10" width="84" height="8" rx="2" fill="#16a34a"/>
    <rect x="8" y="24" width="60" height="4" rx="1" fill="#94a3b8"/>
    <rect x="8" y="32" width="84" height="3" rx="1" fill="#e2e8f0"/>
    <rect x="8" y="38" width="84" height="3" rx="1" fill="#e2e8f0"/>
    <rect x="8" y="44" width="84" height="3" rx="1" fill="#e2e8f0"/>
    <rect x="8" y="55" width="84" height="30" rx="2" fill="#fef9c3" stroke="#eab308" stroke-width="1"/>
    <text x="50" y="74" text-anchor="middle" font-size="8" font-weight="bold" fill="#854d0e">CÉDULA</text>
    <text x="50" y="82" text-anchor="middle" font-size="6" font-weight="bold" fill="#854d0e">HABITABILIDAD</text>
    <rect x="8" y="92" width="40" height="4" rx="1" fill="#94a3b8"/>
    <rect x="8" y="100" width="30" height="3" rx="1" fill="#cbd5e1"/>
    <rect x="8" y="107" width="50" height="3" rx="1" fill="#cbd5e1"/>
    <!-- Stamp -->
    <g transform="translate(75, 95)">
      <circle r="18" fill="none" stroke="url(#stamp)" stroke-width="2.5" opacity=".5"/>
      <text x="0" y="3" text-anchor="middle" font-size="7" font-weight="bold" fill="#991b1b" opacity=".6">VALIDEZ</text>
      <text x="0" y="11" text-anchor="middle" font-size="5" fill="#991b1b" opacity=".6">15 AÑOS</text>
    </g>
  </g>

  <!-- Document 2: Certificado Energético (right) -->
  <g filter="url(#shadow)" transform="translate(440, 170) rotate(5)">
    <rect x="0" y="0" width="100" height="130" rx="3" fill="url(#doc1)" stroke="#cbd5e1" stroke-width="1.5"/>
    <rect x="8" y="10" width="84" height="8" rx="2" fill="#3b82f6"/>
    <rect x="8" y="24" width="65" height="4" rx="1" fill="#94a3b8"/>
    <rect x="8" y="32" width="84" height="3" rx="1" fill="#e2e8f0"/>
    <rect x="8" y="38" width="84" height="3" rx="1" fill="#e2e8f0"/>
    <rect x="8" y="44" width="84" height="3" rx="1" fill="#e2e8f0"/>
    <!-- Energy label A-G -->
    <rect x="8" y="55" width="84" height="30" rx="2" fill="#166534"/>
    <text x="50" y="68" text-anchor="middle" font-size="8" font-weight="bold" fill="white">CERTIFICADO</text>
    <text x="50" y="78" text-anchor="middle" font-size="6" font-weight="bold" fill="#86efac">ENERGÉTICO</text>
    <!-- A-G scale mini -->
    <rect x="12" y="88" width="10" height="6" rx="1" fill="#22c55e"/>
    <rect x="24" y="88" width="10" height="6" rx="1" fill="#a3e635"/>
    <rect x="36" y="88" width="10" height="6" rx="1" fill="#fef08a"/>
    <rect x="48" y="88" width="10" height="6" rx="1" fill="#fbbf24"/>
    <rect x="60" y="88" width="10" height="6" rx="1" fill="#fb923c"/>
    <rect x="72" y="88" width="10" height="6" rx="1" fill="#ef4444"/>
    <text x="10" y="100" text-anchor="middle" font-size="4" fill="#22c55e" font-weight="bold">A</text>
    <text x="78" y="100" text-anchor="middle" font-size="4" fill="#ef4444" font-weight="bold">G</text>
    <!-- Stamp -->
    <g transform="translate(75, 110)">
      <circle r="12" fill="none" stroke="#3b82f6" stroke-width="2" opacity=".5"/>
      <text x="0" y="3" text-anchor="middle" font-size="5" font-weight="bold" fill="#1e40af" opacity=".6">10 AÑOS</text>
    </g>
  </g>

  <!-- Checkmark / verification icon between documents -->
  <circle cx="390" cy="240" r="24" fill="#16a34a" opacity=".15"/>
  <circle cx="390" cy="240" r="18" fill="#16a34a" opacity=".3"/>
  <path d="M378 240 l8 8 16-16" fill="none" stroke="#16a34a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- People illustration: seller -->
  <g transform="translate(590, 320)">
    <!-- Body -->
    <circle cx="0" cy="-40" r="18" fill="#fbbf24"/>
    <rect x="-15" y="-22" width="30" height="45" rx="5" fill="#3b82f6"/>
    <line x1="-15" y1="-10" x2="-40" y2="10" stroke="#3b82f6" stroke-width="8" stroke-linecap="round"/>
    <line x1="15" y1="-10" x2="40" y2="10" stroke="#3b82f6" stroke-width="8" stroke-linecap="round"/>
    <line x1="-10" y1="23" x2="-10" y2="55" stroke="#1f2937" stroke-width="5" stroke-linecap="round"/>
    <line x1="10" y1="23" x2="10" y2="55" stroke="#1f2937" stroke-width="5" stroke-linecap="round"/>
    <!-- Face -->
    <circle cx="-6" cy="-45" r="2" fill="#1f2937"/>
    <circle cx="6" cy="-45" r="2" fill="#1f2937"/>
    <path d="M-6-38 Q0-33 6-38" fill="none" stroke="#1f2937" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Check list icon -->
  <g transform="translate(480, 360)">
    <rect x="0" y="0" width="40" height="50" rx="3" fill="white" stroke="#16a34a" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="7" y="12" width="26" height="3" rx="1" fill="#e2e8f0"/>
    <rect x="7" y="19" width="20" height="3" rx="1" fill="#e2e8f0"/>
    <rect x="7" y="30" width="12" height="12" rx="2" fill="#dcfce7"/>
    <path d="M9 36 l4 4 8-7" fill="none" stroke="#16a34a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Title bar -->
  <g transform="translate(130, 440)">
    <rect x="-130" y="0" width="600" height="36" rx="18" fill="#166534" opacity=".9"/>
    <text x="170" y="24" text-anchor="middle" font-size="14" font-weight="bold" fill="white" letter-spacing="3">CÉDULA DE HABITABILIDAD + CERTIFICADO ENERGÉTICO</text>
  </g>

  <!-- Subtle decorative dots -->
  <circle cx="40" cy="60" r="4" fill="#16a34a" opacity=".08"/>
  <circle cx="760" cy="80" r="3" fill="#16a34a" opacity=".08"/>
  <circle cx="680" cy="50" r="5" fill="#16a34a" opacity=".06"/>
  <circle cx="50" cy="350" r="3" fill="#16a34a" opacity=".06"/>

  <!-- "VS" badge -->
  <g transform="translate(400, 145)">
    <circle cx="0" cy="0" r="14" fill="#f59e0b"/>
    <text x="0" y="5" text-anchor="middle" font-size="10" font-weight="bold" fill="white">VS</text>
  </g>
</svg>
