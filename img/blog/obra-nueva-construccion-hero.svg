<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#c8e6c9;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="bldg1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f5f0;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e0e0d5;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="bldg2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fafaf5;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e8e8dd;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="roof" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#78909c;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#546e7a;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="labelA" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2e7d32;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1b5e20;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="800" height="500" fill="url(#sky)"/>

  <!-- Sun -->
  <circle cx="680" cy="70" r="40" fill="#ffd54f" opacity="0.9"/>
  <circle cx="680" cy="70" r="50" fill="#ffd54f" opacity="0.2"/>

  <!-- Clouds -->
  <g opacity="0.6" fill="white">
    <ellipse cx="150" cy="60" rx="50" ry="20"/>
    <ellipse cx="180" cy="50" rx="40" ry="18"/>
    <ellipse cx="120" cy="55" rx="30" ry="15"/>
    <ellipse cx="500" cy="80" rx="45" ry="16"/>
    <ellipse cx="530" cy="72" rx="35" ry="14"/>
  </g>

  <!-- Ground -->
  <rect x="0" y="380" width="800" height="120" fill="#8d6e63"/>
  <rect x="0" y="380" width="800" height="15" fill="#a1887f"/>

  <!-- Crane base -->
  <rect x="580" y="160" width="8" height="220" fill="#e65100"/>
  <!-- Crane boom -->
  <rect x="580" y="160" width="6" height="120" fill="#e65100" transform="rotate(-45 580 160)"/>

  <!-- Crane cabin -->
  <rect x="570" y="150" width="28" height="25" rx="3" fill="#ff8f00"/>
  <rect x="574" y="155" width="20" height="8" rx="2" fill="#b3e5fc"/>

  <!-- Crane hook line -->
  <line x1="385" y1="195" x2="385" y2="280" stroke="#666" stroke-width="2"/>
  <!-- Hook -->
  <path d="M 380 280 L 390 280 Q 395 290 385 295 Q 375 300 375 290" fill="none" stroke="#666" stroke-width="2.5"/>

  <!-- Building 1 (existing, left) -->
  <rect x="40" y="180" width="120" height="200" fill="url(#bldg1)" stroke="#ccc" stroke-width="1"/>
  <!-- Windows building 1 -->
  <g fill="#b3e5fc" opacity="0.8">
    <rect x="55" y="195" width="20" height="25" rx="1"/>
    <rect x="95" y="195" width="20" height="25" rx="1"/>
    <rect x="130" y="195" width="20" height="25" rx="1"/>
    <rect x="55" y="240" width="20" height="25" rx="1"/>
    <rect x="95" y="240" width="20" height="25" rx="1"/>
    <rect x="130" y="240" width="20" height="25" rx="1"/>
    <rect x="55" y="285" width="20" height="25" rx="1"/>
    <rect x="95" y="285" width="20" height="25" rx="1"/>
    <rect x="130" y="285" width="20" height="25" rx="1"/>
  </g>
  <rect x="40" y="170" width="120" height="15" fill="url(#roof)" rx="1"/>

  <!-- Scaffolding on building 1 -->
  <g stroke="#e65100" stroke-width="2" fill="none" opacity="0.7">
    <line x1="160" y1="200" x2="195" y2="200"/>
    <line x1="160" y1="280" x2="195" y2="280"/>
    <line x1="195" y1="200" x2="195" y2="280"/>
    <line x1="170" y1="200" x2="170" y2="280"/>
    <line x1="180" y1="200" x2="180" y2="280"/>
    <line x1="160" y1="240" x2="195" y2="240"/>
  </g>

  <!-- Building 2 (new construction, center) -->
  <rect x="220" y="220" width="150" height="160" fill="url(#bldg2)" stroke="#bbb" stroke-width="1"/>
  <!-- Partially built top floor -->
  <rect x="220" y="200" width="150" height="25" fill="#efebe9" stroke="#bbb" stroke-width="1"/>
  <!-- Rebar sticking out -->
  <g fill="none" stroke="#666" stroke-width="2">
    <line x1="235" y1="200" x2="235" y2="185"/>
    <line x1="265" y1="200" x2="265" y2="185"/>
    <line x1="295" y1="200" x2="295" y2="185"/>
    <line x1="325" y1="200" x2="325" y2="185"/>
    <line x1="355" y1="200" x2="355" y2="185"/>
  </g>
  <!-- Windows building 2 (lower floors) -->
  <g fill="#b3e5fc" opacity="0.7">
    <rect x="235" y="235" width="22" height="28" rx="1"/>
    <rect x="280" y="235" width="22" height="28" rx="1"/>
    <rect x="325" y="235" width="22" height="28" rx="1"/>
    <rect x="235" y="280" width="22" height="28" rx="1"/>
    <rect x="280" y="280" width="22" height="28" rx="1"/>
    <rect x="325" y="280" width="22" height="28" rx="1"/>
    <rect x="235" y="325" width="22" height="28" rx="1"/>
    <rect x="280" y="325" width="22" height="28" rx="1"/>
    <rect x="325" y="325" width="22" height="28" rx="1"/>
  </g>

  <!-- Energy label A on new building -->
  <rect x="200" y="250" width="40" height="55" rx="3" fill="url(#labelA)"/>
  <text x="220" y="275" text-anchor="middle" fill="white" font-size="28" font-weight="bold" font-family="sans-serif">A</text>

  <!-- Building 3 (right) -->
  <rect x="410" y="240" width="100" height="140" fill="url(#bldg1)" stroke="#ccc" stroke-width="1"/>
  <g fill="#b3e5fc" opacity="0.7">
    <rect x="422" y="252" width="18" height="22" rx="1"/>
    <rect x="455" y="252" width="18" height="22" rx="1"/>
    <rect x="488" y="252" width="18" height="22" rx="1"/>
    <rect x="422" y="292" width="18" height="22" rx="1"/>
    <rect x="455" y="292" width="18" height="22" rx="1"/>
    <rect x="488" y="292" width="18" height="22" rx="1"/>
    <rect x="422" y="332" width="18" height="22" rx="1"/>
    <rect x="455" y="332" width="18" height="22" rx="1"/>
    <rect x="488" y="332" width="18" height="22" rx="1"/>
  </g>
  <rect x="410" y="232" width="100" height="12" fill="url(#roof)" rx="1"/>

  <!-- Trees -->
  <g>
    <ellipse cx="30" cy="350" rx="20" ry="30" fill="#4caf50"/>
    <rect x="27" y="375" width="6" height="15" fill="#795548"/>
    <ellipse cx="380" cy="360" rx="15" ry="25" fill="#66bb6a"/>
    <rect x="377" y="380" width="5" height="12" fill="#795548"/>
  </g>

  <!-- Grass patches -->
  <rect x="0" y="395" width="800" height="5" fill="#4caf50" opacity="0.3"/>

  <!-- Worker figures -->
  <!-- Worker 1 - with hard hat near crane -->
  <g>
    <circle cx="565" cy="370" r="6" fill="#ffcc80"/>
    <rect x="559" y="376" width="12" height="18" rx="3" fill="#ff8f00"/>
    <rect x="558" y="368" width="14" height="6" rx="3" fill="#ffd600"/>
    <line x1="565" y1="394" x2="558" y2="405" stroke="#333" stroke-width="2"/>
    <line x1="565" y1="394" x2="572" y2="405" stroke="#333" stroke-width="2"/>
  </g>
  <!-- Worker 2 - near building 2 -->
  <g>
    <circle cx="310" cy="382" r="5" fill="#ffcc80"/>
    <rect x="305" y="387" width="10" height="15" rx="2" fill="#1976d2"/>
    <rect x="304" y="380" width="12" height="5" rx="2" fill="#ffd600"/>
    <line x1="310" y1="402" x2="306" y2="410" stroke="#333" stroke-width="2"/>
    <line x1="310" y1="402" x2="314" y2="410" stroke="#333" stroke-width="2"/>
  </g>

  <!-- Dump truck -->
  <g>
    <rect x="640" y="370" width="50" height="18" rx="3" fill="#e65100"/>
    <rect x="642" y="355" width="35" height="18" rx="2" fill="#ef6c00"/>
    <circle cx="652" cy="393" r="7" fill="#444"/>
    <circle cx="652" cy="393" r="3" fill="#888"/>
    <circle cx="680" cy="393" r="7" fill="#444"/>
    <circle cx="680" cy="393" r="3" fill="#888"/>
  </g>

  <!-- Arrow and "New Construction" label -->
  <g transform="translate(290, 140)">
    <rect x="-15" y="-10" width="100" height="22" rx="4" fill="#2e7d32" opacity="0.9"/>
    <text x="35" y="5" text-anchor="middle" fill="white" font-size="11" font-weight="bold" font-family="sans-serif">OBRA NUEVA</text>
    <polygon points="35,16 30,25 40,25" fill="#2e7d32" opacity="0.9"/>
  </g>

  <!-- CTA overlay at bottom -->
  <rect x="0" y="460" width="800" height="40" fill="#547c24" opacity="0.85"/>
  <text x="400" y="485" text-anchor="middle" fill="white" font-size="14" font-family="sans-serif" font-weight="600">CertificadoYa · Certificado energético para obra nueva · Presupuesto gratis en 5 segundos</text>
</svg>
