<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a365d"/>
      <stop offset="100%" style="stop-color:#2d6a4f"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="12"/>
  <!-- Laptop base -->
  <path d="M120 340 L680 340 L710 380 L90 380 Z" fill="#2d3748" rx="4"/>
  <!-- Laptop screen -->
  <rect x="160" y="150" width="480" height="280" rx="8" fill="url(#screen)" stroke="#4a5568" stroke-width="2"/>
  <!-- Screen content - certificate preview -->
  <rect x="220" y="180" width="360" height="50" rx="4" fill="#2e7d32" opacity="0.15"/>
  <rect x="240" y="195" width="120" height="20" rx="3" fill="#2e7d32" opacity="0.3"/>
  <!-- Energy label A -->
  <rect x="500" y="180" width="50" height="50" rx="4" fill="#2e7d32" opacity="0.8"/>
  <text x="525" y="215" text-anchor="middle" fill="white" font-size="28" font-weight="bold" font-family="Arial">A</text>
  <!-- Building icon on screen -->
  <rect x="250" y="260" width="80" height="80" rx="4" fill="#4a5568" opacity="0.2"/>
  <rect x="260" y="270" width="20" height="25" rx="1" fill="#4a5568" opacity="0.3"/>
  <rect x="285" y="280" width="20" height="15" rx="1" fill="#4a5568" opacity="0.3"/>
  <rect x="310" y="270" width="20" height="25" rx="1" fill="#4a5568" opacity="0.3"/>
  <!-- Text lines on screen -->
  <rect x="350" y="270" width="100" height="8" rx="2" fill="#4a5568" opacity="0.25"/>
  <rect x="350" y="285" width="80" height="8" rx="2" fill="#4a5568" opacity="0.25"/>
  <rect x="350" y="300" width="120" height="8" rx="2" fill="#4a5568" opacity="0.25"/>
  <rect x="350" y="315" width="60" height="8" rx="2" fill="#4a5568" opacity="0.25"/>
  <!-- Data bars -->
  <rect x="250" y="360" width="200" height="12" rx="6" fill="#2e7d32" opacity="0.3"/>
  <rect x="250" y="380" width="160" height="12" rx="6" fill="#43a047" opacity="0.3"/>
  <rect x="250" y="400" width="240" height="12" rx="6" fill="#66bb6a" opacity="0.3"/>
  <!-- Arrow / mouse cursor -->
  <path d="M440 360 L460 340 L455 380 Z" fill="#2d3748" opacity="0.5"/>
  <!-- Icons floating -->
  <g opacity="0.08">
    <circle cx="700" cy="120" r="30" fill="white"/>
    <circle cx="100" cy="380" r="20" fill="white"/>
    <circle cx="680" cy="420" r="15" fill="white"/>
  </g>
  <!-- Shield / secure icon -->
  <path d="M720 80 L740 70 L760 80 L755 110 L740 125 L725 110 Z" fill="white" opacity="0.15" stroke="white" stroke-width="1.5"/>
</svg>