<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" font-family="Outfit, 'Segoe UI', sans-serif">
  <defs>
    <!-- Degradado cielo -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a24"/>
      <stop offset="60%" stop-color="#1b1b1f"/>
      <stop offset="100%" stop-color="#1b1b1f"/>
    </linearGradient>
    <!-- Degradado edificios fondo -->
    <linearGradient id="buildBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a32"/>
      <stop offset="100%" stop-color="#1f1f25"/>
    </linearGradient>
    <!-- Degradado edificio principal -->
    <linearGradient id="buildMain" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#3d3d48"/>
      <stop offset="50%" stop-color="#4a4a55"/>
      <stop offset="100%" stop-color="#353540"/>
    </linearGradient>
    <!-- Degradado edificio sol -->
    <linearGradient id="buildSun" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#c9a032"/>
    </linearGradient>
    <!-- Oro -->
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#c9a032"/>
    </linearGradient>
    <!-- Nubes -->
    <filter id="blurNube"><feGaussianBlur stdDeviation="4"/></filter>
    <filter id="blurLuz"><feGaussianBlur stdDeviation="15"/></filter>
    <filter id="shadow"><feDropShadow dx="0" dy="3" stdDeviation="8" flood-color="#d4af37" flood-opacity=".15"/></filter>
    <pattern id="ventanas" width="24" height="32" patternUnits="userSpaceOnUse">
      <rect x="3" y="3" width="18" height="26" rx="2" fill="#8a8a99" opacity=".15"/>
    </pattern>
    <pattern id="ventanas2" width="20" height="28" patternUnits="userSpaceOnUse">
      <rect x="2" y="2" width="16" height="24" rx="2" fill="#9a9aaa" opacity=".12"/>
    </pattern>
    <pattern id="ventanas3" width="22" height="30" patternUnits="userSpaceOnUse">
      <rect x="2" y="2" width="18" height="26" rx="2" fill="#7a7a88" opacity=".1"/>
    </pattern>
  </defs>

  <!-- Cielo -->
  <rect width="1200" height="520" fill="url(#sky)"/>

  <!-- Estrellas -->
  <circle cx="100" cy="60" r=".8" fill="#fff" opacity=".3"/>
  <circle cx="250" cy="35" r=".6" fill="#fff" opacity=".2"/>
  <circle cx="450" cy="80" r=".7" fill="#fff" opacity=".25"/>
  <circle cx="600" cy="45" r=".9" fill="#fff" opacity=".3"/>
  <circle cx="800" cy="70" r=".5" fill="#fff" opacity=".2"/>
  <circle cx="900" cy="30" r=".8" fill="#fff" opacity=".25"/>
  <circle cx="1050" cy="90" r=".6" fill="#fff" opacity=".15"/>
  <circle cx="350" cy="50" r=".4" fill="#fff" opacity=".2"/>
  <circle cx="750" cy="25" r=".7" fill="#fff" opacity=".15"/>
  <circle cx="1100" cy="55" r=".5" fill="#fff" opacity=".2"/>

  <!-- Luna -->
  <circle cx="1050" cy="65" r="20" fill="#d4af37" opacity=".25"/>
  <circle cx="1050" cy="65" r="15" fill="#d4af37" opacity=".35"/>

  <!-- Edificios fondo lejano -->
  <rect x="0" y="280" width="120" height="200" fill="#1a1a20" opacity=".8"/>
  <rect x="100" y="300" width="100" height="180" fill="#1a1a20" opacity=".7"/>
  <rect x="180" y="270" width="80" height="210" fill="#1a1a20" opacity=".75"/>
  <rect x="240" y="310" width="70" height="170" fill="#1a1a20" opacity=".7"/>
  <rect x="290" y="260" width="100" height="220" fill="#1a1a20" opacity=".8"/>
  <rect x="370" y="290" width="90" height="190" fill="#1a1a20" opacity=".75"/>
  <rect x="440" y="275" width="110" height="205" fill="#1a1a20" opacity=".7"/>
  <rect x="530" y="295" width="80" height="185" fill="#1a1a20" opacity=".8"/>
  <rect x="590" y="265" width="120" height="215" fill="#1a1a20" opacity=".75"/>
  <rect x="690" y="285" width="90" height="195" fill="#1a1a20" opacity=".7"/>
  <rect x="760" y="270" width="100" height="210" fill="#1a1a20" opacity=".8"/>
  <rect x="840" y="300" width="80" height="180" fill="#1a1a20" opacity=".75"/>
  <rect x="900" y="255" width="110" height="225" fill="#1a1a20" opacity=".7"/>
  <rect x="990" y="280" width="90" height="200" fill="#1a1a20" opacity=".8"/>
  <rect x="1060" y="295" width="80" height="185" fill="#1a1a20" opacity=".75"/>
  <rect x="1120" y="275" width="80" height="205" fill="#1a1a20" opacity=".7"/>

  <!-- Edificios segundo plano -->
  <rect x="30" y="250" width="140" height="250" fill="url(#buildBg)" opacity=".85"/>
  <rect x="150" y="260" width="100" height="240" fill="url(#buildBg)" opacity=".8"/>
  <rect x="350" y="240" width="120" height="260" fill="url(#buildBg)" opacity=".85"/>
  <rect x="480" y="255" width="90" height="245" fill="url(#buildBg)" opacity=".8"/>
  <rect x="700" y="245" width="130" height="255" fill="url(#buildBg)" opacity=".85"/>
  <rect x="850" y="260" width="100" height="240" fill="url(#buildBg)" opacity=".8"/>
  <rect x="980" y="250" width="120" height="250" fill="url(#buildBg)" opacity=".85"/>

  <!-- Edificio principal (bloque típico años 70) -->
  <rect x="250" y="180" width="700" height="320" rx="4" fill="url(#buildMain)" stroke="#555" stroke-width="1"/>
  <!-- Patrón ventanas edificio principal -->
  <rect x="250" y="180" width="700" height="320" fill="url(#ventanas)" opacity=".5"/>

  <!-- Líneas de fachada -->
  <line x1="250" y1="240" x2="950" y2="240" stroke="#555" stroke-width=".5" opacity=".6"/>
  <line x1="250" y1="300" x2="950" y2="300" stroke="#555" stroke-width=".5" opacity=".6"/>
  <line x1="250" y1="360" x2="950" y2="360" stroke="#555" stroke-width=".5" opacity=".6"/>
  <line x1="250" y1="420" x2="950" y2="420" stroke="#555" stroke-width=".5" opacity=".6"/>
  <line x1="250" y1="460" x2="950" y2="460" stroke="#555" stroke-width=".5" opacity=".6"/>

  <!-- Líneas verticales (separación pisos) -->
  <line x1="340" y1="180" x2="340" y2="500" stroke="#555" stroke-width=".5" opacity=".5"/>
  <line x1="430" y1="180" x2="430" y2="500" stroke="#555" stroke-width=".5" opacity=".5"/>
  <line x1="520" y1="180" x2="520" y2="500" stroke="#555" stroke-width=".5" opacity=".5"/>
  <line x1="610" y1="180" x2="610" y2="500" stroke="#555" stroke-width=".5" opacity=".5"/>
  <line x1="700" y1="180" x2="700" y2="500" stroke="#555" stroke-width=".5" opacity=".5"/>
  <line x1="790" y1="180" x2="790" y2="500" stroke="#555" stroke-width=".5" opacity=".5"/>
  <line x1="880" y1="180" x2="880" y2="500" stroke="#555" stroke-width=".5" opacity=".5"/>

  <!-- Ventanas encendidas -->
  <rect x="264" y="194" width="72" height="40" rx="2" fill="#d4af37" opacity=".08"/>
  <rect x="264" y="254" width="72" height="40" rx="2" fill="#d4af37" opacity=".12"/>
  <rect x="354" y="314" width="72" height="40" rx="2" fill="#d4af37" opacity=".08"/>
  <rect x="444" y="194" width="72" height="40" rx="2" fill="#d4af37" opacity=".15"/>
  <rect x="534" y="254" width="72" height="40" rx="2" fill="#d4af37" opacity=".1"/>
  <rect x="624" y="374" width="72" height="40" rx="2" fill="#d4af37" opacity=".08"/>
  <rect x="714" y="194" width="72" height="40" rx="2" fill="#d4af37" opacity=".12"/>
  <rect x="804" y="434" width="72" height="40" rx="2" fill="#d4af37" opacity=".08"/>
  <rect x="534" y="374" width="72" height="40" rx="2" fill="#d4af37" opacity=".1"/>
  <rect x="354" y="434" width="72" height="40" rx="2" fill="#d4af37" opacity=".06"/>

  <!-- Balcones edificio principal -->
  <!-- Fila inferior balcones -->
  <rect x="264" y="460" width="72" height="6" rx="1" fill="#2a2a32" stroke="#555" stroke-width=".5"/>
  <rect x="354" y="460" width="72" height="6" rx="1" fill="#2a2a32" stroke="#555" stroke-width=".5"/>
  <rect x="444" y="460" width="72" height="6" rx="1" fill="#2a2a32" stroke="#555" stroke-width=".5"/>
  <rect x="534" y="460" width="72" height="6" rx="1" fill="#2a2a32" stroke="#555" stroke-width=".5"/>
  <rect x="624" y="460" width="72" height="6" rx="1" fill="#2a2a32" stroke="#555" stroke-width=".5"/>
  <rect x="714" y="460" width="72" height="6" rx="1" fill="#2a2a32" stroke="#555" stroke-width=".5"/>
  <rect x="804" y="460" width="72" height="6" rx="1" fill="#2a2a32" stroke="#555" stroke-width=".5"/>

  <!-- Puerta de entrada -->
  <rect x="560" y="450" width="80" height="50" rx="2" fill="#d4af37" opacity=".3"/>
  <rect x="560" y="450" width="80" height="50" rx="2" fill="none" stroke="#d4af37" stroke-width="1.5"/>
  <circle cx="630" cy="475" r="2" fill="#d4af37" opacity=".5"/>

  <!-- Edificios laterales más pequeños -->
  <rect x="0" y="220" width="250" height="280" fill="#2d2d35" stroke="#444" stroke-width=".5"/>
  <rect x="0" y="220" width="250" height="280" fill="url(#ventanas2)" opacity=".5"/>
  <rect x="950" y="210" width="250" height="290" fill="#2d2d35" stroke="#444" stroke-width=".5"/>
  <rect x="950" y="210" width="250" height="290" fill="url(#ventanas3)" opacity=".5"/>

  <!-- Calle -->
  <rect x="0" y="500" width="1200" height="20" fill="#1a1a20"/>

  <!-- Overlay dorado superior -->
  <rect x="0" y="0" width="1200" height="520" fill="url(#gold)" opacity=".02"/>

  <!-- Marco sutil -->
  <rect x="1" y="1" width="1198" height="518" fill="none" stroke="#d4af37" stroke-width="1" opacity=".3"/>

  <!-- Caja de texto superpuesta -->
  <g filter="url(#shadow)">
    <rect x="100" y="80" width="480" height="110" rx="4" fill="#1b1b1f" opacity=".92"/>
  </g>
  <rect x="100" y="80" width="480" height="110" rx="4" fill="none" stroke="#d4af37" stroke-width=".5" opacity=".6"/>

  <text x="120" y="110" fill="#d4af37" font-size="12" font-weight="700" letter-spacing="3">CERTIFICADOYA</text>
  <text x="120" y="140" fill="#fff" font-size="20" font-weight="700">Vivienda estándar en España:</text>
  <text x="120" y="168" fill="#ccc" font-size="16">cuánto mide, cuánto vale y</text>
  <text x="120" y="186" fill="#d4af37" font-size="16" font-weight="600">cuánto cuesta su CEE</text>

  <!-- Marca sello inferior -->
  <line x1="120" y1="460" x2="400" y2="460" stroke="#d4af37" stroke-width=".5" opacity=".4"/>
  <text x="120" y="478" fill="#666" font-size="10">Análisis de precios · Datos 2024-2026 · 12 ciudades analizadas</text>
</svg>
