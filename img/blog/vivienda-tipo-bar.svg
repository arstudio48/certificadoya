<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" font-family="Outfit, sans-serif">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a7c1e"/>
      <stop offset="100%" stop-color="#6ba32e"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a6b14"/>
      <stop offset="100%" stop-color="#5a8c24"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d5a0e"/>
      <stop offset="100%" stop-color="#4a7c1e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="340" fill="#f7f9f6" rx="12"/>
  <text x="400" y="40" text-anchor="middle" font-size="18" font-weight="700" fill="#2d3a1f">Superficie de la vivienda tipo en España (m² construidos)</text>
  <!-- Pisos -->
  <rect x="60" y="85" width="120" height="200" fill="url(#g3)" rx="4" opacity="0.9"/>
  <text x="120" y="270" text-anchor="middle" font-size="13" fill="#2d3a1f" font-weight="600">Piso 1 hab.</text>
  <text x="120" y="286" text-anchor="middle" font-size="20" fill="#4a7c1e" font-weight="700">60 m²</text>
  <!-- Piso 3 hab -->
  <rect x="210" y="45" width="140" height="240" fill="url(#g1)" rx="4"/>
  <text x="280" y="270" text-anchor="middle" font-size="13" fill="#2d3a1f" font-weight="600">Piso 3 hab.</text>
  <text x="280" y="286" text-anchor="middle" font-size="20" fill="#fff" font-weight="700">97 m²</text>
  <!-- estrella -->
  <text x="280" y="30" text-anchor="middle" font-size="14" fill="#d4af37">★ TIPO</text>
  <!-- Piso 4 hab -->
  <rect x="380" y="105" width="140" height="180" fill="url(#g2)" rx="4" opacity="0.8"/>
  <text x="450" y="270" text-anchor="middle" font-size="13" fill="#2d3a1f" font-weight="600">Piso 4 hab.</text>
  <text x="450" y="286" text-anchor="middle" font-size="20" fill="#4a7c1e" font-weight="700">120 m²</text>
  <!-- Unifamiliar -->
  <rect x="550" y="10" width="160" height="275" fill="url(#g3)" rx="4" opacity="0.7"/>
  <text x="630" y="270" text-anchor="middle" font-size="13" fill="#2d3a1f" font-weight="600">Unifamiliar</text>
  <text x="630" y="286" text-anchor="middle" font-size="20" fill="#4a7c1e" font-weight="700">193 m²</text>
  <!-- nota pie -->
  <text x="400" y="320" text-anchor="middle" font-size="11" fill="#9aab8a">Fuente: INE, Censo de Viviendas 2021 · Catastro</text>
</svg>
