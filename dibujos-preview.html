<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎨 Dibujos CertificadoYa</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap');
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Outfit',sans-serif; background:#f7f9f6; padding:2rem; }
    h1 { text-align:center; color:#2d3a1f; margin-bottom:1.5rem; font-size:1.4rem; }
    .grid { display:flex; gap:1.5rem; justify-content:center; flex-wrap:wrap; max-width:900px; margin:0 auto; }
    .item { background:white; border-radius:16px; padding:1.5rem; width:170px; text-align:center;
            box-shadow:0 2px 12px rgba(0,0,0,.04); border:1px solid #e8ece6; }
    .item img { width:100px; height:100px; display:block; margin:0 auto .75rem; }
    .item span { display:block; font-size:.82rem; color:#2d3a1f; font-weight:600; line-height:1.4; }
    .note { text-align:center; color:#9aab8a; font-size:.78rem; margin-top:2rem; max-width:500px; margin-left:auto; margin-right:auto; }
  

/* B4: UX móvil mejorada — hero, CTA, header */
@media (max-width:480px){
  .hero-content h1{font-size:1.3rem !important;line-height:1.3}
  .hero-content p{font-size:.85rem !important;line-height:1.4}
  .btn-cta{padding:.7rem 1rem !important;font-size:.85rem !important;min-height:44px}
  .header-inner{padding:0 .75rem !important;min-height:56px}
  .mobile-overlay-panel{width:100vw !important;max-width:320px}
  .mobile-overlay-nav a{padding:.75rem 1rem !important;font-size:1rem !important;min-height:44px;display:flex;align-items:center}
  .presupuesto-card-v2{padding:1rem 1rem 5rem !important}
  .precio-destacado{margin-bottom:.6rem !important}
  .resultado-box{padding:.75rem !important}
  footer{padding:1.5rem 1rem !important}
  .footer-grid{grid-template-columns:1fr !important;gap:1rem}
}
@media (max-width:600px){
  .mobile-overlay-close{width:40px;height:40px;font-size:1.2rem}
  .mobile-overlay-nav{margin-top:3.5rem}
  .mobile-overlay-panel{padding-bottom:env(safe-area-inset-bottom,1rem)}
}
</style>
<script data-goatcounter="https://certificadoya.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <h1>✏️ Dibujos originales — estilo Apple</h1>
  <div class="grid">
    <div class="item"><img src="/img/dibujo-certificado.svg" alt="Certificado"><span>Certificado energético</span></div>
    <div class="item"><img src="/img/dibujo-presupuesto.svg" alt="Presupuesto"><span>Presupuesto instantáneo</span></div>
    <div class="item"><img src="/img/dibujo-rapido.svg" alt="Rápido"><span>En 48-72h</span></div>
    <div class="item"><img src="/img/dibujo-tecnico.svg" alt="Técnicos"><span>Técnicos verificados</span></div>
    <div class="item"><img src="/img/dibujo-visita.svg" alt="Visita"><span>Visita técnica</span></div>
    <div class="item"><img src="/img/dibujo-ahorro.svg" alt="Ahorro"><span>Precio justo</span></div>
    <div class="item"><img src="/img/dibujo-confianza.svg" alt="Confianza"><span>Protección y confianza</span></div>
    <div class="item"><img src="/img/dibujo-legal.svg" alt="Legal"><span>Documentación legal</span></div>
  </div>
  <p class="note">Estilo Apple — trazo fino uniforme · curvas precisas · mínimo de líneas · sin rellenos · sin texto</p>
</body>
</html>
