<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✏️ Trazo a lápiz - CertificadoYa</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',sans-serif; background:#f8f7f4; padding:2rem; }
    h1 { text-align:center; color:#1a1a1a; margin-bottom:0.3rem; font-size:1.25rem; font-weight:600; }
    .subtitle { text-align:center; color:#999; font-size:.82rem; margin-bottom:2rem; }
    .grid { display:flex; gap:1.2rem; justify-content:center; flex-wrap:wrap; max-width:900px; margin:0 auto; }
    .item { background:white; border-radius:16px; padding:1.5rem; width:150px; text-align:center;
            box-shadow:0 2px 8px rgba(0,0,0,.03); border:1px solid #eee; }
    .item svg { width:80px; height:80px; display:block; margin:0 auto .6rem; }
    .item span { display:block; font-size:.75rem; color:#555; font-weight:500; line-height:1.3; }
    .note { text-align:center; color:#aaa; font-size:.72rem; margin-top:2rem; max-width:500px; margin-left:auto; margin-right:auto; font-style:italic; }
  

/* B4: UX móvil mejorada — hero, CTA, header */
@media (max-width:480px){
  .hero-content h1{font-size:1.3rem !important;line-height:1.3}
  .hero-content p{font-size:.85rem !important;line-height:1.4}
  .btn-cta{padding:.7rem 1rem !important;font-size:.85rem !important;min-height:44px}
  .header-inner{padding:0 .75rem !important;min-height:56px}
  .mobile-overlay-panel{width:100vw !important;max-width:320px}
  .mobile-overlay-nav a{padding:.75rem 1rem !important;font-size:1rem !important;min-height:44px;display:flex;align-items:center}
  .presupuesto-card-v2{padding:1rem 1rem 5rem !important}
  .precio-destacado{margin-bottom:.6rem !important}
  .resultado-box{padding:.75rem !important}
  footer{padding:1.5rem 1rem !important}
  .footer-grid{grid-template-columns:1fr !important;gap:1rem}
}
@media (max-width:600px){
  .mobile-overlay-close{width:40px;height:40px;font-size:1.2rem}
  .mobile-overlay-nav{margin-top:3.5rem}
  .mobile-overlay-panel{padding-bottom:env(safe-area-inset-bottom,1rem)}
}
</style>
<script data-goatcounter="https://certificadoya.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <h1>✏️ Trazo a lápiz</h1>
  <p class="subtitle">Dibujados a mano — textura de lápiz sobre papel</p>
  <div class="grid">
    <div class="item"><img src="/img/lapiz-certificado.svg" alt="Certificado"><span>Certificado energético</span></div>
    <div class="item"><img src="/img/lapiz-presupuesto.svg" alt="Presupuesto"><span>Presupuesto</span></div>
    <div class="item"><img src="/img/lapiz-rapido.svg" alt="Rápido"><span>48-72h</span></div>
    <div class="item"><img src="/img/lapiz-tecnico.svg" alt="Técnicos"><span>Técnicos verificados</span></div>
    <div class="item"><img src="/img/lapiz-visita.svg" alt="Visita"><span>Visita técnica</span></div>
    <div class="item"><img src="/img/lapiz-ahorro.svg" alt="Ahorro"><span>Precio justo</span></div>
    <div class="item"><img src="/img/lapiz-confianza.svg" alt="Confianza"><span>Protección</span></div>
    <div class="item"><img src="/img/lapiz-legal.svg" alt="Legal"><span>Documentación legal</span></div>
  </div>
  <p class="note">Trazos irregulares · textura de papel · doble línea · filtro de lápiz · estilo boceto original</p>
</body>
</html>
