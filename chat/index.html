<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Habla con CertificadoYa</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Outfit, sans-serif; background: #f5f7f4; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .chat-box { width: 380px; max-width: 100%; background: white; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); padding: 24px; }
    h1 { font-size: 1.3rem; color: #1a5c2e; margin-bottom: 4px; }
    p.sub { font-size: 0.85rem; color: #666; margin-bottom: 20px; }
    .messages { height: 300px; overflow-y: auto; background: #fafbfa; border-radius: 10px; padding: 12px; margin-bottom: 16px; font-size: 0.9rem; }
    .msg-user { background: #e3f0da; padding: 8px 12px; border-radius: 12px 12px 4px 12px; margin-bottom: 8px; text-align: right; }
    .msg-bot { background: white; border: 1px solid #e0e8e0; padding: 8px 12px; border-radius: 12px 12px 12px 4px; margin-bottom: 8px; }
    .msg-bot .bot-text { display: inline; }
    .msg-system { text-align: center; font-size: 0.75rem; color: #999; margin: 8px 0; }
    .status { font-size: 0.75rem; color: #888; margin-bottom: 12px; }
    .status.ok { color: #2e7d32; }
    .status.err { color: #c62828; }
    .chat-input { display: flex; gap: 8px; margin-bottom: 12px; }
    .chat-input input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 10px; font-size: 0.9rem; outline: none; }
    .chat-input input:focus { border-color: #1a5c2e; }
    .btn { padding: 12px; border: none; border-radius: 10px; font-size: 1rem; cursor: pointer; font-weight: 600; transition: all 0.2s; }
    .btn-talk { background: #1a5c2e; color: white; padding: 12px 16px; }
    .btn-talk:hover { background: #2e8b47; }
    .btn-talk:disabled { background: #ccc; cursor: not-allowed; }
    .btn-talk.recording { background: #c62828; animation: pulse 1s infinite; }
    .btn-send { background: #1a5c2e; color: white; padding: 10px 16px; }
    .btn-send:hover { background: #2e8b47; }
    .btn-send:disabled { background: #ccc; cursor: not-allowed; }
    .btn-speaker { background: none; border: 1px solid #1a5c2e; color: #1a5c2e; border-radius: 50%; width: 28px; height: 28px; font-size: 0.85rem; cursor: pointer; margin-left: 6px; vertical-align: middle; line-height: 1; display: inline-flex; align-items: center; justify-content: center; transition: all 0.2s; }
    .btn-speaker:hover { background: #1a5c2e; color: white; }
    .btn-speaker.playing { background: #2e8b47; color: white; animation: pulse 0.5s infinite; }
    .transcript { font-size: 0.8rem; color: #888; font-style: italic; margin-top: 8px; }
    @keyframes pulse { 50% { opacity: 0.7; } }
    .loading::after { content: '...'; animation: dots 1.5s steps(3) infinite; }
    @keyframes dots { 33% { content: '.'; } 66% { content: '..'; } }
    /* Volume slider */
    .volume-row { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; font-size: 0.75rem; color: #888; }
    .volume-row input[type=range] { flex: 1; height: 4px; accent-color: #1a5c2e; }
  </style>
</head>
<body>
<div class="chat-box">
  <h1>🏠 CertificadoYa</h1>
  <p class="sub">Pregúntame sobre certificados energéticos</p>
  <div class="messages" id="messages">
    <div class="msg-bot">¡Hola! Pregúntame lo que quieras sobre certificados energéticos: precios, proceso, obligatoriedad, etc. Puedes escribir o usar el micrófono 🎤</div>
  </div>
  <div class="status" id="status">Conectando...</div>
  <div class="volume-row">
    <span>🔊</span>
    <input type="range" id="volumeSlider" min="0" max="100" value="80">
    <span id="volLabel">80%</span>
  </div>
  <div class="chat-input">
    <input type="text" id="textInput" placeholder="Escribe tu mensaje..." onkeypress="if(event.key==='Enter') sendText()">
    <button class="btn btn-send" id="sendBtn" onclick="sendText()">Enviar</button>
  </div>
  <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
    <button class="btn btn-talk" id="talkBtn">🎤 Hablar</button>
    <span style="font-size:0.8rem;color:#999;flex:1">O pulsa para grabar voz</span>
  </div>
  <div class="transcript" id="transcript"></div>
</div>

<script>
// Configuration
const API_URL = "https://02eb2ab23bba52.lhr.life";

let audioChunks = [];
let isRecording = false;
let audioCtx = null;
let isProcessing = false;
let volume = 0.8; // default
let gainNode = null;

const talkBtn = document.getElementById("talkBtn");
const sendBtn = document.getElementById("sendBtn");
const statusDiv = document.getElementById("status");
const messagesDiv = document.getElementById("messages");
const transcriptDiv = document.getElementById("transcript");
const textInput = document.getElementById("textInput");
const volumeSlider = document.getElementById("volumeSlider");
const volLabel = document.getElementById("volLabel");

// Volume control
volumeSlider.addEventListener("input", () => {
  volume = volumeSlider.value / 100;
  volLabel.textContent = volumeSlider.value + "%";
  if (gainNode) gainNode.gain.value = volume;
});

function getAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    gainNode = audioCtx.createGain();
    gainNode.gain.value = volume;
    gainNode.connect(audioCtx.destination);
  }
  return audioCtx;
}

// Session ID for conversation memory
function getSessionId() {
  let sid = localStorage.getItem("chat_session_id");
  if (!sid) {
    sid = crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).slice(2);
    localStorage.setItem("chat_session_id", sid);
  }
  return sid;
}

async function checkService() {
  try {
    let r = await fetch(`${API_URL}/health`, { method: "GET", signal: AbortSignal.timeout(5000) });
    if (r.ok) {
      statusDiv.textContent = "🟢 Conectado";
      statusDiv.className = "status ok";
      talkBtn.disabled = false;
      sendBtn.disabled = false;
    } else {
      throw new Error("Not OK");
    }
  } catch (e) {
    statusDiv.textContent = "🔴 Servicio no disponible. Recarga la página.";
    statusDiv.className = "status err";
    talkBtn.disabled = true;
    sendBtn.disabled = true;
  }
}

async function sendText() {
  const text = textInput.value.trim();
  if (!text || isProcessing) return;
  textInput.value = "";
  addMessage("user", text);
  isProcessing = true;
  sendBtn.disabled = true;
  transcriptDiv.textContent = "⏳ Procesando...";
  
  try {
    let r = await fetch(`${API_URL}/api/chat`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text, session_id: getSessionId() }),
      signal: AbortSignal.timeout(60000)
    });
    let data = await r.json();
    transcriptDiv.textContent = "";
    if (data.type === "response") {
      addMessage("bot", data.text, data.audio_b64);
    } else {
      addMessage("bot", data.text || "Error del servidor");
    }
  } catch (e) {
    transcriptDiv.textContent = "⚠️ Error de conexión. Intenta de nuevo.";
    addMessage("system", "Error: " + (e.message || "timeout"));
  }
  isProcessing = false;
  sendBtn.disabled = false;
}

// Resample audio Float32Array to 16kHz using OfflineAudioContext
async function resampleTo16k(audioData, inputSampleRate) {
  if (inputSampleRate === 16000) return audioData;
  const ratio = 16000 / inputSampleRate;
  const outLen = Math.floor(audioData.length * ratio);
  const ctx = new OfflineAudioContext(1, outLen, 16000);
  const buf = ctx.createBuffer(1, audioData.length, inputSampleRate);
  buf.getChannelData(0).set(audioData);
  const src = ctx.createBufferSource();
  src.buffer = buf;
  src.connect(ctx.destination);
  src.start();
  const rendered = await ctx.startRendering();
  return new Float32Array(rendered.getChannelData(0));
}

async function startRecording() {
  if (isRecording || isProcessing) return;
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks = [];
    const ctx = getAudioCtx();
    const source = ctx.createMediaStreamSource(stream);
    const processor = ctx.createScriptProcessor(4096, 1, 1);
    source.connect(processor);
    processor.connect(ctx.destination);
    isRecording = true;
    talkBtn.textContent = "🔴 Grabando...";
    talkBtn.className = "btn btn-talk recording";
    transcriptDiv.textContent = "🎤 Escuchando...";
    processor.onaudioprocess = (e) => {
      if (!isRecording) return;
      audioChunks.push(new Float32Array(e.inputBuffer.getChannelData(0)));
    };
    window._audioStream = stream;
    window._audioContext = ctx;
    window._processor = processor;
    window._source = source;
  } catch (err) {
    addMessage("system", "Error al acceder al micrófono. ¿Has dado permiso?");
  }
}

function stopRecording() {
  if (!isRecording) return;
  isRecording = false;
  if (window._audioStream) window._audioStream.getTracks().forEach(t => t.stop());
  talkBtn.textContent = "🎤 Hablar";
  talkBtn.className = "btn btn-talk";
  if (audioChunks.length === 0) return;
  const totalLen = audioChunks.reduce((acc, c) => acc + c.length, 0);
  const combined = new Float32Array(totalLen);
  let offset = 0;
  for (const chunk of audioChunks) { combined.set(chunk, offset); offset += chunk.length; }
  transcriptDiv.textContent = "⏳ Procesando audio...";
  isProcessing = true;
  // Resample to 16kHz and send
  const sr = getAudioCtx().sampleRate;
  resampleTo16k(combined, sr).then(resampled => {
    fetch(`${API_URL}/api/voice`, {
      method: "POST",
      headers: { "Content-Type": "application/octet-stream", "X-Session-Id": getSessionId() },
      body: resampled.buffer,
      signal: AbortSignal.timeout(60000)
    })
    .then(r => r.json())
    .then(data => {
      transcriptDiv.textContent = "";
      if (data.type === "response") {
        addMessage("user", data.transcript_text || "(voz)");
        addMessage("bot", data.text, data.audio_b64);
      } else {
        addMessage("bot", data.text || "No te he entendido");
      }
    })
    .catch(e => {
      transcriptDiv.textContent = "⚠️ Error de conexión";
      addMessage("system", "Error: " + (e.message || "timeout"));
    })
    .finally(() => {
      isProcessing = false;
      audioChunks = [];
    });
  });
}
function addMessage(role, text, audioB64) {
  const div = document.createElement("div");
  div.className = `msg-${role}`;
  
  if (role === "bot" && audioB64) {
    // Texto + botón altavoz
    const span = document.createElement("span");
    span.className = "bot-text";
    span.textContent = text;
    div.appendChild(span);
    
    const btn = document.createElement("button");
    btn.className = "btn-speaker";
    btn.textContent = "🔊";
    btn.title = "Reproducir voz";
    btn.onclick = () => {
      btn.classList.add("playing");
      playAudio(audioB64, () => btn.classList.remove("playing"));
    };
    div.appendChild(btn);
  } else {
    div.textContent = text;
  }
  
  messagesDiv.appendChild(div);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function playAudio(base64Audio, onEnd) {
  try {
    getAudioCtx();
    const binary = atob(base64Audio);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    const blob = new Blob([bytes], { type: "audio/wav" });
    const url = URL.createObjectURL(blob);
    if (audioCtx.state === "suspended") audioCtx.resume();
    fetch(url)
      .then(r => r.arrayBuffer())
      .then(buf => audioCtx.decodeAudioData(buf))
      .then(audioBuf => {
        const source = audioCtx.createBufferSource();
        source.buffer = audioBuf;
        if (gainNode) {
          source.connect(gainNode);
        } else {
          source.connect(audioCtx.destination);
        }
        source.start(0);
        if (onEnd) { source.onended = () => { onEnd(); URL.revokeObjectURL(url); }; }
        else { source.onended = () => URL.revokeObjectURL(url); }
      })
      .catch(e => console.log("Audio error:", e));
  } catch (e) { console.log("Audio error:", e); }
}

talkBtn.addEventListener("click", () => {
  if (isRecording) stopRecording();
  else startRecording();
});

checkService();
</script>
</body>
</html>
